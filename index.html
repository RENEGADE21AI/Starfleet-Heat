<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sky Raid Dynamic Plus v6.31</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    font-family: Arial, sans-serif;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W = 0, H = 0;
let activePointerId = null;
let devSkipCooldown = 0;
const DEV_SKIP_COOLDOWN_FRAMES = 48;
const MAX_PARTICLES = 900;

let enemyIdCounter = 1;

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const rand = (min, max) => min + Math.random() * (max - min);
const TAU = Math.PI * 2;

const STORAGE_KEY = "sky_raid_high_score_v3";
let highScore = 0;
let highScoreDirty = false;

const ENEMY_DATA = {
  red:     { threat: 1.0, score: 20, radius: 12, hp: 2 },
  orange:  { threat: 1.4, score: 30, radius: 10, hp: 1 },
  purple:  { threat: 2.4, score: 45, radius: 17, hp: 2 },
  phantom: { threat: 3.0, score: 150, radius: 14, hp: 2 }
};

const BOSS_SCORE = {
  standard: 1000,
  wraith: 1700
};

function hexToRgb(hex) {
  const s = hex.replace("#", "").trim();
  const v = s.length === 3 ? s.split("").map(ch => ch + ch).join("") : s;
  const n = parseInt(v, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function mixHex(a, b, t) {
  const c1 = hexToRgb(a);
  const c2 = hexToRgb(b);
  const u = clamp(t, 0, 1);
  const r = Math.round(c1.r + (c2.r - c1.r) * u);
  const g = Math.round(c1.g + (c2.g - c1.g) * u);
  const bl = Math.round(c1.b + (c2.b - c1.b) * u);
  return `rgb(${r},${g},${bl})`;
}

function loadHighScore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const n = raw ? parseInt(raw, 10) : 0;
    highScore = Number.isFinite(n) ? n : 0;
  } catch {
    highScore = 0;
  }
}

function saveHighScore() {
  try {
    localStorage.setItem(STORAGE_KEY, String(highScore));
    highScoreDirty = false;
  } catch {}
}

function saveMilestone() {
  if (highScoreDirty) saveHighScore();
}

function showNextMessage() {
  if (state.messageQueue.length > 0) {
    const m = state.messageQueue.shift();
    state.message = m.text;
    state.messageTimer = m.frames;
    state.messageMax = m.frames;
  } else {
    state.message = "";
    state.messageTimer = 0;
    state.messageMax = 0;
  }
}

function showMessage(text, frames = 90) {
  const item = { text, frames };
  if (state.messageTimer > 0 || state.messageQueue.length > 0) {
    state.messageQueue.push(item);
  } else {
    state.message = text;
    state.messageTimer = frames;
    state.messageMax = frames;
  }
}

function circleHit(ax, ay, ar, bx, by, br) {
  return Math.hypot(ax - bx, ay - by) < ar + br;
}

function laneCenters() {
  return [W * 0.22, W * 0.50, W * 0.78];
}

function laneIndexFromX(x) {
  if (x < W / 3) return 0;
  if (x < (2 * W) / 3) return 1;
  return 2;
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function wrapAngle(a) {
  while (a > Math.PI) a -= TAU;
  while (a < -Math.PI) a += TAU;
  return a;
}

function waveItem(type, x, y, delay = 0, extra = {}) {
  return { type, x, y, delay, extra };
}

function isWraithActive() {
  return !!(state.boss && state.boss.mode === "wraith");
}

function bossHudOffset() {
  return (state.boss || state.bossDeath) ? 32 : 0;
}

function getPlayerShotKind() {
  if (isWraithActive()) return state.playerRealm === 1 ? "ghost" : "physical";
  return "physical";
}

function enemyBulletCost(kind) {
  if (kind === "aimed") return 1.25;
  if (kind === "boss") return 1.5;
  if (kind === "phantomShot") return 1.0;
  if (kind === "purple") return 1.0;
  if (kind === "wraithPhysical" || kind === "wraithGhost") return 1.05;
  return 0.9;
}

function enemyBulletPressure() {
  let total = 0;
  for (const b of state.enemyBullets) total += enemyBulletCost(b.kind);
  return total;
}

function enemyBulletBudget() {
  let base = 11 + state.phase * 1.4;
  if (state.phase === 1) base = 8.5 + state.phaseTimer / 240;
  if (state.player.hp <= 2) base -= 2.0;
  if (state.player.hp === 1) base -= 1.0;
  if (state.difficulty.grace > 0) base -= 2.0;
  if (state.difficulty.ghostGrace > 0) base -= 1.2;
  if (state.boss) base -= 1.5;
  base -= state.difficulty.burst * 3.5;

  if (state.intensityPhase === "surge") base += 2.0;
  if (state.intensityPhase === "cooldown") base -= 1.3;

  return clamp(base * state.difficulty.threat, 8, 26);
}

function canSpendBulletBudget(cost) {
  const budget = state.cachedBulletBudget || enemyBulletBudget();
  const load = (state.cachedBulletPressure || enemyBulletPressure()) + (state.frameBulletSpent || 0);
  return load + cost <= budget;
}

function spendBulletBudget(cost) {
  state.frameBulletSpent = (state.frameBulletSpent || 0) + cost;
}

const state = {
  player: null,
  bullets: [],
  enemyBullets: [],
  enemies: [],
  powerups: [],
  particles: [],
  boss: null,
  bossDeath: null,
  bossRecovery: 0,
  wingmen: [],
  pendingSpawns: [],
  stars: [],
  score: 0,
  multiplier: 1,
  comboKills: 0,
  comboPulse: 0,
  phase: 1,
  frame: 0,
  waveTimer: 0,
  phaseTimer: 0,
  waveIndex: 0,
  waveRest: 0,
  pressure: 20,
  threatScore: 0,
  cachedBulletPressure: 0,
  cachedBulletBudget: 0,
  frameBulletSpent: 0,
  message: "",
  messageTimer: 0,
  messageMax: 0,
  messageQueue: [],
  fx: { shake: 0, flash: 0 },
  difficulty: {
    threat: 0.75,
    target: 0.75,
    grace: 0,
    ghostGrace: 0,
    heatStreak: false,
    lastHitFrame: -999,
    killStreak: 0,
    burst: 0
  },
  keyboard: { up: false, down: false, left: false, right: false },
  joystick: { active: false, id: null, cx: 0, cy: 0, ax: 0, ay: 0, radius: 56 },
  playerRealm: 0,
  devStatsVisible: false,
  killsSinceLastDrop: 0,
  framesSinceLastDrop: 0,
  powerupDropCooldown: 0,
  lastBossMode: null,
  intensityPhase: "normal",
  intensityTimer: 180,
  gameState: "start"
};

function makePlayer() {
  return {
    x: W / 2,
    y: H * 0.80,
    vx: 0,
    vy: 0,
    hp: 5,
    maxHp: 5,
    energy: 100,
    maxEnergy: 100,
    inv: 0,
    fire: 0,
    spread: 0,
    rapid: 0,
    ghostTimer: 0,
    ghostCooldown: 0,
    maxSpeed: 5.2
  };
}

function refreshMultiplier() {
  const prev = state.multiplier || 1;
  const next = clamp(1 + Math.floor(Math.sqrt(state.comboKills) / 2), 1, 4);
  state.multiplier = next;
  if (next > prev) {
    state.comboPulse = 16;
    state.fx.flash = Math.max(state.fx.flash, 3 + next);
  }
}

function addScore(basePoints) {
  const pts = Math.round(basePoints * state.multiplier);
  state.score += pts;
  if (state.score > highScore) {
    highScore = state.score;
    highScoreDirty = true;
  }
}

function addFlatScore(points) {
  state.score += points;
  if (state.score > highScore) {
    highScore = state.score;
    highScoreDirty = true;
  }
}

function noteKill(basePoints) {
  state.comboKills++;
  state.difficulty.killStreak++;
  refreshMultiplier();
  addScore(basePoints);
}

function resetCombo() {
  state.comboKills = 0;
  refreshMultiplier();
  state.difficulty.killStreak = 0;
}

function enforceParticleCap() {
  if (state.particles.length > MAX_PARTICLES) {
    state.particles.splice(0, state.particles.length - MAX_PARTICLES);
  }
}

function spawnParticles(x, y, count = 12, color = "#fff", speed = 1) {
  for (let i = 0; i < count; i++) {
    const ang = rand(0, TAU);
    const sp = rand(0.8, 3.5) * speed;
    state.particles.push({
      x,
      y,
      vx: Math.cos(ang) * sp + rand(-0.4, 0.4),
      vy: Math.sin(ang) * sp + rand(-0.4, 0.4),
      life: rand(16, 32),
      size: rand(1.5, 3.5),
      color
    });
  }
  enforceParticleCap();
}

function spawnDeathBurst(x, y, count = 16) {
  for (let i = 0; i < count; i++) {
    const ang = rand(0, TAU);
    const sp = rand(2.2, 5.0);
    state.particles.push({
      x,
      y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: rand(14, 26),
      size: rand(1.8, 4.2),
      color: "#fff"
    });
  }
  enforceParticleCap();
}

function spawnRapidFireMuzzleParticles(x, y) {
  const count = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++) {
    state.particles.push({
      x: x + rand(-1.1, 1.1),
      y: y + rand(-0.8, 0.8),
      vx: rand(-0.45, 0.45),
      vy: rand(-1.2, -0.35),
      life: rand(10, 16),
      size: rand(1.8, 3.0),
      color: "#fff"
    });
  }
  enforceParticleCap();
}

function spawnPowerupAt(x, y, type) {
  state.powerups.push({ x, y, type, vy: 1.9, size: 11, life: 900 });
}

function countBulletsByKind(kind) {
  let n = 0;
  for (const b of state.enemyBullets) if (b.kind === kind) n++;
  return n;
}

function activePurpleCount() {
  let n = 0;
  for (const e of state.enemies) if (e.type === "purple") n++;
  return n;
}

function activePhantomCount() {
  let n = 0;
  for (const e of state.enemies) if (e.type === "phantom") n++;
  return n;
}

function phantomCapForPhase() {
  if (state.phase >= 13) return 5;
  if (state.phase >= 10) return 4;
  return 3;
}

function safePowerupType() {
  const lowHp = state.player.hp <= 2;
  const r = Math.random();

  if (lowHp) {
    if (r < 0.34) return "repair";
    if (r < 0.58) return "wingman";
    if (r < 0.74) return "dual";
    if (r < 0.87) return "spread";
    return "rapid";
  } else {
    if (r < 0.35) return "spread";
    if (r < 0.70) return "rapid";
    if (r < 0.88) return "repair";
    if (r < 0.95) return "wingman";
    return "dual";
  }
}

function registerPowerupDrop(cooldownMin = 240, cooldownMax = 360) {
  state.killsSinceLastDrop = 0;
  state.framesSinceLastDrop = 0;
  state.powerupDropCooldown = cooldownMin + Math.floor(rand(0, Math.max(1, cooldownMax - cooldownMin)));
}

function shouldDropPowerupNow() {
  if (state.powerupDropCooldown > 0) return false;
  if (state.framesSinceLastDrop >= 900) return true;

  const drought = clamp((state.framesSinceLastDrop - 240) / 660, 0, 1);
  const killFactor = clamp((state.killsSinceLastDrop - 1) / 6, 0, 1);

  let chance = 0.022 + drought * 0.16 + killFactor * 0.11;
  if (state.player.hp <= 2) chance += 0.03;
  if (state.phase >= 10) chance += 0.01;

  if (state.intensityPhase === "cooldown") chance += 0.05;
  if (state.intensityPhase === "surge") chance -= 0.02;

  return Math.random() < chance;
}

function dropPowerup(x, y) {
  spawnPowerupAt(x, y, safePowerupType());
}

function bossRewardDrops(x, y) {
  const primary = Math.random() < 0.5 ? "spread" : "rapid";
  spawnPowerupAt(x - 18, y - 2, primary);
  if (Math.random() < 0.5) {
    const pool = ["spread", "rapid", "repair", "wingman", "dual"];
    spawnPowerupAt(x + 18, y + 2, pool[Math.floor(Math.random() * pool.length)]);
  }
}

function chooseLane(exclude = []) {
  const counts = [0, 0, 0];
  for (const e of state.enemies) {
    if (e.escape) continue;
    counts[laneIndexFromX(e.x)]++;
  }

  let best = [];
  let min = Infinity;
  for (let i = 0; i < 3; i++) {
    if (exclude.includes(i)) continue;
    if (counts[i] < min) {
      min = counts[i];
      best = [i];
    } else if (counts[i] === min) {
      best.push(i);
    }
  }

  if (!best.length) return 1;
  return best[Math.floor(Math.random() * best.length)];
}

function laneX(lane) {
  return laneCenters()[lane];
}

function getWingman(side) {
  return state.wingmen.find(w => w.side === side) || null;
}

function refreshWingmen(timer = 1500) {
  for (const w of state.wingmen) w.timer = Math.max(w.timer, timer);
}

function addWingmanSide(side, timer = 1500) {
  const existing = getWingman(side);
  if (existing) {
    existing.timer = Math.max(existing.timer, timer);
    return existing;
  }

  const p = state.player;
  const w = { x: p.x + side * 30, y: p.y + 4, side, timer, fire: 0 };
  state.wingmen.push(w);
  return w;
}

function spawnWingmen(count) {
  const timer = 1500;

  if (count >= 2) {
    addWingmanSide(-1, timer);
    addWingmanSide(1, timer);
    if (state.wingmen.length === 2) refreshWingmen(timer);
    return;
  }

  if (!getWingman(-1)) addWingmanSide(-1, timer);
  else if (!getWingman(1)) addWingmanSide(1, timer);
  else refreshWingmen(timer);
}

function fireWingman(w) {
  if (w.fire > 0) return;
  state.bullets.push({
    x: w.x,
    y: w.y - 12,
    vx: 0,
    vy: -8.2,
    life: 80,
    r: 3,
    kind: getPlayerShotKind(),
    realm: state.playerRealm
  });
  w.fire = 18;
}

function currentInputVector() {
  let x = 0;
  let y = 0;

  if (state.keyboard.left) x -= 1;
  if (state.keyboard.right) x += 1;
  if (state.keyboard.up) y -= 1;
  if (state.keyboard.down) y += 1;

  if (state.joystick.active) {
    x += state.joystick.ax;
    y += state.joystick.ay;
  }

  const mag = Math.hypot(x, y);
  if (mag > 1) {
    x /= mag;
    y /= mag;
  }

  return { x, y };
}

function attemptGhost() {
  if (state.gameState !== "playing") return;

  const p = state.player;

  if (isWraithActive()) {
    const cost = 18;
    if (p.energy < cost) return;
    p.energy -= cost;
    state.playerRealm = 1 - state.playerRealm;
    state.fx.flash = Math.max(state.fx.flash, 4);
    state.comboPulse = Math.max(state.comboPulse, 6);
    spawnParticles(p.x, p.y, 10, state.playerRealm === 0 ? "#bfe8ff" : "#d9b6ff", 0.9);
    return;
  }

  if (p.energy < 35 || p.ghostCooldown > 0) return;

  const input = currentInputVector();
  let dx = input.x;
  let dy = input.y;

  const vMag = Math.hypot(p.vx, p.vy);
  if (Math.abs(dx) + Math.abs(dy) < 0.1 && vMag > 0.2) {
    dx = p.vx / vMag;
    dy = p.vy / vMag;
  }

  if (Math.abs(dx) + Math.abs(dy) < 0.1) {
    dx = 0;
    dy = -1;
  }

  p.vx += dx * 4.6;
  p.vy += dy * 4.6;
  p.ghostTimer = 18;
  p.inv = 24;
  p.ghostCooldown = 20;
  p.energy -= 35;

  state.difficulty.ghostGrace = 60;
  state.fx.flash = Math.max(state.fx.flash, 6);
  spawnParticles(p.x, p.y, 10, "#fff", 1.05);
}

function updateStars() {
  for (const s of state.stars) {
    s.y += s.spd;
    if (s.y > H + 4) {
      s.y = -4;
      s.x = Math.random() * W;
    }
  }
}

function phaseDuration(phase) {
  if (phase === 1) return 1100;
  if (phase === 2) return 980;
  if (phase === 3) return 880;
  return Math.max(500, 840 - (phase - 4) * 22);
}

function rhythmProfile() {
  if (state.boss || state.bossDeath) return { pressure: 0, interval: 0 };
  const beat = state.phaseTimer % 240;
  if (beat < 45) return { pressure: -7, interval: 18 };
  if (beat < 135) return { pressure: 10, interval: -12 };
  if (beat < 170) return { pressure: -4, interval: 10 };
  return { pressure: 12, interval: -16 };
}

function peakLoad() {
  const enemyLoad = Math.max(0, state.enemies.length - 8) / 14;
  const bulletLoad = Math.max(0, enemyBulletPressure() - enemyBulletBudget()) / 8;
  return clamp(enemyLoad + bulletLoad, 0, 1.2);
}

function triggerPhaseSkip() {
  if (state.gameState !== "playing") return;
  if (devSkipCooldown > 0) return;

  devSkipCooldown = DEV_SKIP_COOLDOWN_FRAMES;

  state.bullets = [];
  state.enemyBullets = [];
  state.enemies = [];
  state.pendingSpawns = [];
  state.powerups = [];
  state.boss = null;
  state.bossDeath = null;
  state.bossRecovery = 0;
  state.waveRest = 24;
  state.playerRealm = 0;

  state.phase++;
  state.phaseTimer = 0;
  state.waveTimer = 0;
  state.pressure = 0;
  state.threatScore = 0;
  state.difficulty.grace = 90;
  state.difficulty.ghostGrace = 0;
  state.difficulty.heatStreak = false;
  state.difficulty.threat = Math.max(0.68, state.difficulty.threat - 0.08);
  state.difficulty.target = state.difficulty.threat;

  state.fx.flash = Math.max(state.fx.flash, 8);
  showMessage("PHASE " + state.phase, 90);
  if (state.phase % 4 === 0) spawnBoss();
}

function inDevSkipZone(x, y) {
  const zoneW = W * 0.15;
  const zoneH = H * 0.15;
  return x > W - zoneW && y < zoneH;
}

function onDevToggleZone(x, y) {
  return x >= W / 3 && x <= (2 * W) / 3 && y >= 0 && y <= 60;
}

function updateIntensityCycle() {
  if (state.boss || state.bossDeath) {
    state.intensityPhase = "normal";
    state.intensityTimer = Math.max(state.intensityTimer, 120);
    return;
  }

  const d = state.difficulty;
  const p = state.player;
  const sinceHit = state.frame - d.lastHitFrame;
  const strong = sinceHit > 720 && d.killStreak >= 5 && state.phase >= 3;
  const fragile = p.hp <= 2 || state.pressure > 74;

  state.intensityTimer--;

  if (state.intensityTimer <= 0) {
    if (state.intensityPhase === "normal") {
      state.intensityPhase = strong ? "surge" : (fragile ? "cooldown" : (Math.random() < 0.6 ? "surge" : "cooldown"));
      state.intensityTimer = state.intensityPhase === "surge"
        ? 300 + Math.floor(rand(0, 120))
        : 170 + Math.floor(rand(0, 90));
    } else if (state.intensityPhase === "surge") {
      state.intensityPhase = "cooldown";
      state.intensityTimer = 180 + Math.floor(rand(0, 100));
    } else {
      state.intensityPhase = "normal";
      state.intensityTimer = 170 + Math.floor(rand(0, 120));
    }
  }

  if (state.intensityPhase === "normal") {
    if (strong && Math.random() < 0.01) {
      state.intensityPhase = "surge";
      state.intensityTimer = 260 + Math.floor(rand(0, 100));
    } else if (fragile && Math.random() < 0.008) {
      state.intensityPhase = "cooldown";
      state.intensityTimer = 180 + Math.floor(rand(0, 80));
    }
  }
}

function updatePressure() {
  const p = state.player;
  const enemyLoad = state.enemies.length * 3.5;
  const bulletLoad = state.enemyBullets.length * 2.1;
  const queueLoad = state.pendingSpawns.length * 1.2;
  const comboLoad = Math.max(0, state.comboKills - 3) * 0.8;
  const bossLoad = state.boss ? 12 : 0;
  const relief = (5 - p.hp) * 8 + (state.difficulty.grace > 0 ? 10 : 0) + (state.difficulty.ghostGrace > 0 ? 4 : 0);
  const rhythm = rhythmProfile();
  const intensityBias = state.intensityPhase === "surge" ? 9 : state.intensityPhase === "cooldown" ? -8 : 0;

  const target = clamp(
    18 + state.phase * 4 + enemyLoad + bulletLoad + queueLoad + comboLoad + bossLoad - relief + rhythm.pressure + intensityBias,
    0,
    100
  );

  state.pressure += (target - state.pressure) * 0.04;
}

function updateDifficulty() {
  const d = state.difficulty;
  const p = state.player;
  const sinceHit = state.frame - d.lastHitFrame;

  if (sinceHit > 600) d.heatStreak = false;

  if (state.boss && !state.bossDeath) {
    const bossLerp = p.hp === 1 ? 0.06 : (p.hp === p.maxHp && d.killStreak > 0 ? 0.03 : 0.025);
    d.threat += (d.target - d.threat) * bossLerp;
    d.grace = Math.max(0, d.grace - 1);
    d.ghostGrace = Math.max(0, d.ghostGrace - 1);
    d.burst = Math.max(0, d.burst - 0.03);
    return;
  }

  let target = 0.78 + (state.phase - 1) * 0.075;
  if (state.phase === 1) target += clamp(state.phaseTimer / 1800, 0, 0.20);
  else target += clamp((state.phaseTimer - 180) / 2200, 0, 0.14);

  target -= (p.maxHp - p.hp) * 0.05;
  if (p.hp === 1) target -= 0.04;
  if (d.grace > 0) target -= 0.10;
  if (d.ghostGrace > 0) target -= 0.07;
  if (d.heatStreak) target -= 0.12;

  const killBonus = sinceHit > 900 ? 0.10 : clamp(d.killStreak * 0.0025, 0, 0.08);
  target += killBonus;

  target -= clamp(d.burst, 0, 3) * 0.03;
  target += (state.pressure - 50) / 180;
  if (activePhantomCount() > 0) target -= 0.06;

  if (state.intensityPhase === "surge") target += 0.06;
  if (state.intensityPhase === "cooldown") target -= 0.05;

  d.target = clamp(target, 0.70, 1.40);

  let lerp = 0.025;
  if (p.hp === 1) lerp = 0.06;
  else if (p.hp === p.maxHp && d.killStreak > 0) lerp = 0.03;

  d.threat += (d.target - d.threat) * lerp;
  d.threat = clamp(d.threat, 0.70, 1.40);

  if (d.grace > 0) d.grace--;
  if (d.ghostGrace > 0) d.ghostGrace--;
  d.burst = Math.max(0, d.burst - 0.03);
  if (state.frame % 180 === 0) d.killStreak = Math.max(0, d.killStreak - 1);
}

function fireEnemyBullet(x, y, vx, vy, kind = "purple", extra = {}) {
  const cost = enemyBulletCost(kind);
  if (state.enemyBullets.length >= 36) return;

}

function fireBossBullet(x, y, angle, speed, kind = "boss", damage = 1, life = 240) {

}

function phantomFrontArcOK(e, tx, ty) {
  const aim = Math.atan2(ty - e.y, tx - e.x);
  const forward = Math.atan2(e.vy || 0.001, e.vx || 0.001);
  return Math.abs(wrapAngle(aim - forward)) <= Math.PI / 2;
}

  breather: waveTemplateBreather,
  redV: waveTemplateRedV,
  redWall: waveTemplateRedWall,
  staggerMix: waveTemplateStaggerMix,
  orangePair: waveTemplateOrangePair,
  mixedChevron: waveTemplateMixedChevron,
  orangeRibbon: waveTemplateOrangeRibbon,
  purpleGuard: waveTemplatePurpleGuard,
  splitAmbush: waveTemplateSplitAmbush,
  orangeChain: waveTemplateOrangeChain,
  orangeSlash: waveTemplateOrangeSlash,
  phantomProbe: waveTemplatePhantomProbe,
  phantomPair: waveTemplatePhantomPair,
  phantomFan: waveTemplatePhantomFan
};

function selectWaveTemplate() {
  if (state.phase >= 5 && Math.random() < 0.08) {
    const phantomPool = ["phantomProbe", "phantomPair", "phantomFan"];
    const name = phantomPool[Math.floor(Math.random() * phantomPool.length)];
    return { name, fn: waveTemplates[name] };
  }

  const tier = clamp(Math.floor((state.phase - 1) / 2), 0, 2);
  const pressure = clamp(Math.floor(state.pressure / 34), 0, 2);
  const pools = [
    ["breather", "redV", "redWall"],
    ["staggerMix", "orangePair", "mixedChevron", "orangeChain", "redWall"],
    ["orangeRibbon", "purpleGuard", "splitAmbush", "orangeChain", "orangeSlash", "mixedChevron"]
  ];

  let pool = pools[tier];
  let name = pool[clamp(Math.floor((pressure / 2) + (state.waveIndex % 2)), 0, pool.length - 1)];
  return { name, fn: waveTemplates[name] };
}

function templateDensity(events) {
  let d = 0;
  for (const ev of events) {
    if (ev.type === "red") d += 1.0;
    else if (ev.type === "orange") d += 1.2;
    else if (ev.type === "purple") d += 2.4;
    else if (ev.type === "phantom") d += 1.8;
    else d += 1.0;
  }
  return d;
}

function spawnWave() {
  const sel = selectWaveTemplate();
  const events = sel.fn ? sel.fn() : [];

  state.pendingSpawns.push(...events);

  const density = templateDensity(events);
  if (density >= 5.5) {
    const followName = Math.random() < 0.5 ? "breather" : "orangePair";
    const follow = waveTemplates[followName] ? waveTemplates[followName]() : [];
    for (const ev of follow) ev.delay += 34 + Math.floor(rand(0, 20));
    state.pendingSpawns.push(...follow);
    state.waveRest = Math.max(state.waveRest, 18 + Math.floor(rand(0, 12)));
  } else if (density >= 4.0) {
    state.waveRest = Math.max(state.waveRest, 12 + Math.floor(rand(0, 8)));
  }

  state.waveIndex++;
}

function spawnEnemy(type, x, y, extra = {}) {
  if (type === "red") {
    const nearbyReds = state.enemies.filter(e => e.type === "red" && Math.abs(e.x - x) < 90 && Math.abs(e.y - y) < 110).length;
    if (nearbyReds >= 2 && Math.random() < 0.55) return;
    if (Math.random() < 0.05) return;
  }
  if (type === "purple" && activePurpleCount() >= (state.phase >= 8 ? 2 : 3)) return;
  if (type === "phantom" && activePhantomCount() >= phantomCapForPhase()) return;

  const phaseBoost = Math.min(state.phase * 0.08, 1.35);
  const hpBoost = Math.floor((state.phase - 1) / 4);
  const data = ENEMY_DATA[type] || ENEMY_DATA.red;

  const base = {
    id: enemyIdCounter++,
    x, y, type,
    hp: data.hp,
    maxHp: data.hp,
    r: data.radius,
    reward: data.score,
    vx: 0,
    vy: 2,
    dir: Math.random() < 0.5 ? -1 : 1,
    shoot: 0,
    warn: 0,
    recover: 0,
    escape: false,
    escapeEdge: "left",
    launchFrames: 0,
    launchVX: 0,
    launchVY: 0,
    loopPhase: rand(0, TAU),
    motion: "zigzag",
    t: rand(0, 60),
    prevX: x,
    prevY: y,
    turnTimer: 0,
    turnDir: Math.random() < 0.5 ? -1 : 1,
    snapTimer: 0,
    driftPhase: rand(0, TAU),
    driftDir: Math.random() < 0.5 ? -1 : 1,
    driftPower: rand(0.06, 0.22),
    flash: 0,
    hitFlash: 0,
    hitPulse: 0,
    entryFrames: 0
  };

  if (type === "red") {
    base.vy = 1.8 + phaseBoost;
    base.hp = 2;
    base.maxHp = 2;
    base.r = 12;
    base.motion = "drift";
    base.entryFrames = extra.bossSpawn ? 0 : 4;
  } else if (type === "orange") {
    base.vy = 2.55 + phaseBoost * 0.22;
    base.vx = 3.2 + state.phase * 0.05;
    base.hp = 1 + Math.floor(hpBoost * 0.08);
    base.maxHp = base.hp;
    base.r = 10;
    base.motion = ["zigzag", "burst", "snap", "chain", "sweep"][Math.floor(Math.random() * 5)];
    base.turnTimer = rand(14, 38);
    base.turnDir = Math.random() < 0.5 ? -1 : 1;
    base.entryFrames = extra.bossSpawn ? 0 : 8;
  } else if (type === "purple") {
    base.vy = 1.05 + phaseBoost * 0.18;
    base.hp = 2 + hpBoost;
    base.maxHp = base.hp;
    base.r = 17;
    base.shoot = 62 + Math.floor(rand(0, 22));
    base.volleySeed = Math.floor(rand(0, 4));
    base.motion = "drift";
    base.entryFrames = extra.bossSpawn ? 0 : 6;
  } else if (type === "phantom") {
    base.x = clamp(W / 2 + (x - W / 2) * 0.75 + rand(-10, 10), 20, W - 20);
    base.y = y;
    base.vy = 1.55 + phaseBoost * 0.14;
    base.hp = 2;
    base.maxHp = 2;
    base.r = 14;
    base.reward = 150;
    base.motion = "phantom";
    base.stateMode = extra.stateMode || "physical";
    base.cycleTimer = (extra.cycleTimer != null) ? extra.cycleTimer : rand(0, phantomCycleDuration(base.stateMode));
    base.telegraphTimer = extra.telegraphTimer || 0;
    base.fireTimer = (extra.fireTimer != null) ? extra.fireTimer : rand(24, 72);
    base.phaseOffset = rand(0, TAU);
    base.flickerSeed = rand(0, 9999);
    base.entryFrames = extra.bossSpawn ? 0 : 6;
  }

  state.enemies.push(Object.assign(base, extra));
}

function calculateThreatScore() {
  let score = 0;
  for (const e of state.enemies) {
    if (e.type === "red") score += ENEMY_DATA.red.threat;
    else if (e.type === "orange") score += ENEMY_DATA.orange.threat;
    else if (e.type === "purple") score += ENEMY_DATA.purple.threat;
    else if (e.type === "phantom") score += ENEMY_DATA.phantom.threat;
    else score += 1.0;
  }
  for (const b of state.enemyBullets) score += (b.kind === "boss" || b.kind === "wraithPhysical" || b.kind === "wraithGhost") ? 0.22 : 0.18;
  score += state.pendingSpawns.length * 0.22;
  if (state.boss) score += state.boss.mode === "wraith" ? 5.5 : 4.5;
  if (state.bossDeath) score += 1.0;
  return score;
}

function fireAngle(x, y, angle, speed, kind = "purple") {
  fireEnemyBullet(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, kind);
}

function fireAimedBurst(fromX, fromY, targetX, targetY, count, spreadDeg, speed, kind = "boss") {
  const base = Math.atan2(targetY - fromY, targetX - fromX);
  const spread = spreadDeg * Math.PI / 180;
  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0 : (i / (count - 1)) * 2 - 1;
    fireAngle(fromX, fromY, base + t * spread, speed, kind);
  }
}

function updatePlayer() {
  const p = state.player;
  const input = currentInputVector();
  const desiredVX = input.x * p.maxSpeed;
  const desiredVY = input.y * p.maxSpeed;
  const steer = p.ghostTimer > 0 ? 0.11 : 0.16;

  p.vx += (desiredVX - p.vx) * steer;
  p.vy += (desiredVY - p.vy) * steer;

  const speedCap = p.ghostTimer > 0 ? p.maxSpeed * 1.5 : p.maxSpeed;
  const v = Math.hypot(p.vx, p.vy);
  if (v > speedCap) {
    p.vx = (p.vx / v) * speedCap;
    p.vy = (p.vy / v) * speedCap;
  }

  p.x += p.vx;
  p.y += p.vy;

  const minY = H * 0.60;
  const maxY = H - 28;
  if (p.x < 20) { p.x = 20; p.vx = 0; }
  if (p.x > W - 20) { p.x = W - 20; p.vx = 0; }
  if (p.y < minY) { p.y = minY; p.vy = 0; }
  if (p.y > maxY) { p.y = maxY; p.vy = 0; }

  if (p.inv > 0) p.inv--;
  if (p.fire > 0) p.fire--;
  if (p.spread > 0) p.spread--;
  if (p.rapid > 0) p.rapid--;
  if (p.ghostTimer > 0) p.ghostTimer--;
  if (p.ghostCooldown > 0) p.ghostCooldown--;

  const regen = state.intensityPhase === "cooldown" ? 7.2 / 60 : state.intensityPhase === "surge" ? 4.2 / 60 : 5 / 60;
  p.energy = clamp(p.energy + regen, 0, p.maxEnergy);
  firePlayer();
}

function firePlayer() {
  const p = state.player;
  const cooldown = p.rapid > 0 ? 9 : 14;
  if (p.fire > 0) return;

  const kind = getPlayerShotKind();
  const tipX = p.x;
  const tipY = p.y - 16;

  if (p.spread > 0) {
    state.bullets.push({ x: p.x - 11, y: p.y - 14, vx: -2.3, vy: -8.6, life: 90, r: 3, kind, realm: state.playerRealm });
    state.bullets.push({ x: p.x, y: p.y - 16, vx: 0, vy: -9.0, life: 90, r: 3, kind, realm: state.playerRealm });
    state.bullets.push({ x: p.x + 11, y: p.y - 14, vx: 2.3, vy: -8.6, life: 90, r: 3, kind, realm: state.playerRealm });
  } else {
    state.bullets.push({ x: p.x, y: p.y - 16, vx: 0, vy: -9.0, life: 90, r: 3, kind, realm: state.playerRealm });
  }

  if (p.rapid > 0) spawnRapidFireMuzzleParticles(tipX, tipY);

  p.fire = cooldown;
}

function updateWingmen() {
  if (!state.wingmen.length) return;
  const p = state.player;
  for (let i = state.wingmen.length - 1; i >= 0; i--) {
    const w = state.wingmen[i];
    w.timer--;
    w.fire--;
    w.x += (p.x + w.side * 30 - w.x) * 0.22;
    w.y += (p.y + 2 - w.y) * 0.22;

    if (w.timer <= 0) {
      state.wingmen.splice(i, 1);
      continue;
    }

    fireWingman(w);
  }
}

function updateBullets() {
  const p = state.player;

  for (const b of state.bullets) {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.x < -20 || b.x > W + 20) b.life = 0;
  }

  for (const b of state.enemyBullets) {
    if (b.kind === "wraithPhysical" || b.kind === "wraithGhost") {
      b.age = (b.age || 0) + 1;
      b.trail = b.trail || [];
      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > 8) b.trail.shift();

      if (b.seed != null) {
        b.vx += Math.sin((state.frame + b.seed) * 0.045) * 0.015;
        b.vy += Math.cos((state.frame + b.seed) * 0.035) * 0.006;
        const sp = Math.hypot(b.vx, b.vy);
        if (sp > b.maxSpeed) {
          b.vx = (b.vx / sp) * b.maxSpeed;
          b.vy = (b.vy / sp) * b.maxSpeed;
        }
      }
    }

    b.x += b.vx || 0;
    b.y += b.vy || 0;
    b.life--;

    const canInteract = b.realm == null || b.realm === state.playerRealm;
    if (canInteract && !b.nearMissed && state.gameState === "playing") {
      const d = Math.hypot(b.x - p.x, b.y - p.y);
      if (d > 14 && d < 22) {
        b.nearMissed = true;
        p.energy = clamp(p.energy + 0.8, 0, p.maxEnergy);
        spawnParticles(b.x, b.y, 4, "#aaf", 0.6);
      }
    }

    if (b.x < -40 || b.x > W + 40 || b.y > H + 40) b.life = 0;
  }

  state.bullets = state.bullets.filter(b => b.life > 0 && b.y > -40);
  state.enemyBullets = state.enemyBullets.filter(b => b.life > 0);
}

function spawnBossAdds() {
  const b = state.boss;
  if (!b) return;
  if (state.enemies.length > 12 + state.phase) return;

  const mouthX = b.x;
  const mouthY = b.y + b.h / 2 + 6;
  const lane = laneIndexFromX(b.x);
  const patterns = state.phase < 3 ? ["red"] : state.phase < 5 ? ["red", "orange"] : ["red", "orange", "purple"];

  const type1 = patterns[Math.floor(Math.random() * patterns.length)];
  const lane1 = chooseLane([lane]);

  spawnEnemy(type1, mouthX, mouthY, {
    bossSpawn: true,
    spawnMode: "boss",
    spawnPhase: "emerge",
    spawnTimer: 18,
    launchTimer: 12,
    spawnOriginX: mouthX,
    spawnOriginY: mouthY,
    spawnTargetX: laneX(lane1),
    spawnTargetY: mouthY + 72,
    recover: 28
  });

  if (state.phase >= 4 && Math.random() < 0.55) {
    const lane2 = chooseLane([lane, lane1]);
    const type2 = patterns[Math.floor(Math.random() * patterns.length)];
    spawnEnemy(type2, mouthX, mouthY, {
      bossSpawn: true,
      spawnMode: "boss",
      spawnPhase: "emerge",
      spawnTimer: 18,
      launchTimer: 12,
      spawnOriginX: mouthX,
      spawnOriginY: mouthY,
      spawnTargetX: laneX(lane2),
      spawnTargetY: mouthY + 82,
      recover: 28
    });
  }

  spawnParticles(b.x, b.y + b.h / 2 + 10, 14, "#fff", 0.7);
}

function phantomCycleDuration(mode) {
  return mode === "physical" ? 132 : 78;
}

function fireWraithBullet(fromX, fromY, angle, speed, realm, driftSeed = 0) {
  const kind = realm === 0 ? "wraithPhysical" : "wraithGhost";
  const cost = enemyBulletCost(kind);
  if (state.enemyBullets.length >= 54) return;
  if (!canSpendBulletBudget(cost)) return;
  spendBulletBudget(cost);

  state.enemyBullets.push({
    x: fromX,
    y: fromY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    kind,
    realm,
    life: realm === 0 ? 220 : 200,
    r: realm === 0 ? 4 : 5,
    damage: 1,
    age: 0,
    seed: driftSeed || Math.random() * 9999,
    trail: [],
    maxSpeed: realm === 0 ? 6.0 : 5.4
  });
}

function fireWraithVolley(boss) {
  const p = state.player;
  const from = { x: boss.x, y: boss.y + 10 };
  const mainRealm = state.playerRealm;
  const offRealm = 1 - mainRealm;
  const hpPct = boss.hp / boss.maxHp;
  const total = hpPct > 0.68 ? 9 : hpPct > 0.38 ? 12 : 15;
  const mainCount = Math.max(2, Math.round(total * 0.75));
  const offCount = Math.max(1, total - mainCount);
  const base = Math.atan2(p.y - from.y, p.x - from.x);

  if (boss.realm === 0) {
    const spread = 24 * Math.PI / 180;
    for (let i = 0; i < mainCount; i++) {
      const t = mainCount === 1 ? 0 : (i / (mainCount - 1)) * 2 - 1;
      fireWraithBullet(from.x, from.y, base + t * spread, 4.1, mainRealm, state.frame + i);
    }
    for (let i = 0; i < offCount; i++) {
      const t = offCount === 1 ? 0 : (i / (offCount - 1)) * 2 - 1;
      fireWraithBullet(from.x, from.y, base + t * (14 * Math.PI / 180) + 0.06, 3.0, offRealm, state.frame + 100 + i);
    }
  } else {
    const spread = 18 * Math.PI / 180;
    for (let i = 0; i < mainCount; i++) {
      const t = mainCount === 1 ? 0 : (i / (mainCount - 1)) * 2 - 1;
      fireWraithBullet(from.x, from.y, base + t * spread, 3.7, mainRealm, state.frame + i);
    }
    for (let i = 0; i < offCount; i++) {
      const t = offCount === 1 ? 0 : (i / (offCount - 1)) * 2 - 1;
      fireWraithBullet(from.x, from.y, base + t * (12 * Math.PI / 180) - 0.05, 3.0, offRealm, state.frame + 100 + i);
    }
  }

  boss.corePulse = (boss.corePulse || 0) + 0.22;
  state.fx.shake = Math.max(state.fx.shake, 3);
}

function fireWraithCharge(boss) {
  const p = state.player;
  const from = { x: boss.x, y: boss.y + 10 };
  const currentRealm = state.playerRealm;
  const offRealm = 1 - currentRealm;
  const hpPct = boss.hp / boss.maxHp;
  const total = hpPct > 0.38 ? 12 : 14;
  const mainCount = total - 3;
  const base = Math.atan2(p.y - from.y, p.x - from.x);
  const mainSpread = 16 * Math.PI / 180;
  const offSpread = 8 * Math.PI / 180;

  for (let i = 0; i < mainCount; i++) {
    const t = mainCount === 1 ? 0 : (i / (mainCount - 1)) * 2 - 1;
    fireWraithBullet(from.x, from.y, base + t * mainSpread, currentRealm === 0 ? 4.7 : 4.0, currentRealm, state.frame + 200 + i);
  }
  for (let i = 0; i < 3; i++) {
    const t = 3 === 1 ? 0 : (i / 2) * 2 - 1;
    fireWraithBullet(from.x, from.y, base + t * offSpread + 0.08, currentRealm === 0 ? 3.2 : 2.8, offRealm, state.frame + 400 + i);
  }

  boss.chargeResolutionBonus = state.playerRealm !== boss.chargeStartRealm ? 1 : 0;
  boss.corePulse = (boss.corePulse || 0) + 0.42;
  state.fx.shake = Math.max(state.fx.shake, 5);
}

function spawnWraithPhantomBurst(boss) {
  const count = 3 + Math.floor(rand(0, 3));
  const base = rand(0, TAU);
  const spread = 0.95;
  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0 : (i / (count - 1)) * 2 - 1;
    const ang = base + t * spread;
    const sp = 1.4 + rand(0.2, 0.8);
    spawnEnemy("phantom", boss.x + Math.cos(ang) * 8, boss.y + 10 + Math.sin(ang) * 6, {
      launchFrames: 14,
      launchVX: Math.cos(ang) * sp,
      launchVY: Math.sin(ang) * sp + 0.4,
      cycleTimer: rand(0, phantomCycleDuration("physical")),
      fireTimer: rand(24, 72),
      stateMode: Math.random() < 0.5 ? "physical" : "ghost",
      bossSpawn: true
    });
  }
}

function startWraithShift(boss, reason = "damage") {
  if (boss.shiftTelegraph > 0 || boss.chargeTelegraph > 0) return;
  boss.shiftTelegraph = 30;
  boss.shiftReason = reason;
  boss.nextRealm = 1 - boss.realm;
  state.fx.flash = Math.max(state.fx.flash, 4);
}

function finishWraithShift(boss) {
  boss.realm = boss.nextRealm;
  boss.shiftTelegraph = 0;
  boss.shiftReason = "";
  boss.nextRealm = null;
  boss.hitsSinceShift = 0;
  boss.nextShiftHits = 6 + Math.floor(rand(0, 3));
  boss.passiveTimer = 0;
  boss.attackTimer = Math.min(boss.attackTimer, 38);
  boss.realmPulse = 16;
}

function wraithAttackCooldown(boss) {
  const hpPct = boss.hp / boss.maxHp;
  const base = hpPct > 0.7 ? 54 : hpPct > 0.4 ? 42 : hpPct > 0.2 ? 30 : 24;
  return clamp(Math.round(base / clamp(state.difficulty.threat, 0.8, 1.15)), 22, 68);
}

function spawnWraithBoss() {
  const hp = Math.floor((88 + state.phase * 6) * 1.05);
  state.boss = {
    mode: "wraith",
    x: W / 2,
    y: -120,
    w: 152,
    h: 96,
    hp,
    maxHp: hp,
    entered: false,
    realm: 0,
    nextRealm: 1,
    shiftTelegraph: 0,
    shiftReason: "",
    hitsSinceShift: 0,
    nextShiftHits: 6 + Math.floor(rand(0, 3)),
    passiveTimer: 0,
    shift60Triggered: false,
    shift30Triggered: false,
    attackTimer: 54,
    chargeTelegraph: 0,
    chargeStartRealm: 0,
    chargeDodged: false,
    chargeRecovery: 0,
    movePhase: rand(0, TAU),
    flicker: 0,
    corePulse: 0,
    realmPulse: 0,
    phantomSpewTimer: state.phase >= 4 ? 300 + Math.floor(rand(0, 120)) : 9999
  };
  state.playerRealm = 0;
  state.player.ghostTimer = 0;
  state.player.ghostCooldown = 0;
  showMessage("WRAITH BOSS INCOMING... REALM HOP ACTIVATED", 150);
}

function chooseBossAttackType(b, hpPct) {
  const seq =
    hpPct > 0.70 ? ["spread", "aimed", "spawn", "spread"] :
    hpPct > 0.40 ? ["aimed", "fan", "spawn", "aimed"] :
                   ["fan", "spawn", "aimed", "fan"];
  return seq[b.step % seq.length];
}

function bossCooldown(hpPct, threat) {
  let cd = 72;
  if (hpPct > 0.7) cd = 60;
  else if (hpPct > 0.4) cd = 48;
  else if (hpPct > 0.15) cd = 38;
  else cd = 32;
  cd -= Math.round((1 - hpPct) * 4);
  return clamp(Math.round(cd / clamp(threat, 0.8, 1.15)), 30, 80);
}

function pickBossMode() {
  if (state.phase < 8) return "standard";
  if (state.lastBossMode === "standard") return "wraith";
  if (state.lastBossMode === "wraith") return "standard";
  return "standard";
}

function spawnBoss() {
  if (state.gameState !== "playing" || state.boss || state.bossDeath) return;

  const mode = pickBossMode();
  state.lastBossMode = mode;

  if (mode === "wraith") {
    spawnWraithBoss();
    return;
  }

  const maxHp = Math.floor(80 + state.phase * 18);
  state.boss = {
    mode: "standard",
    x: W / 2,
    y: -100,
    w: 130,
    h: 82,
    hp: maxHp,
    maxHp,
    entered: false,
    cooldown: 72,
    warn: 0,
    warnMax: 0,
    pending: null,
    step: 0,
    bay: 0,
    mouthOpen: 0
  };
  state.playerRealm = 0;
  showMessage("BOSS INCOMING", 120);
}

function spawnBossDeath(boss) {
  state.bossDeath = {
    x: boss.x,
    y: boss.y,
    w: boss.w,
    h: boss.h,
    timer: 0,
    life: 150,
    pieces: []
  };

  const cols = 5;
  const rows = 3;
  const pw = boss.w / cols;
  const ph = boss.h / rows;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const px = boss.x - boss.w / 2 + c * pw + pw / 2;
      const py = boss.y - boss.h / 2 + r * ph + ph / 2;
      state.bossDeath.pieces.push({
        x: px,
        y: py,
        w: pw - 2,
        h: ph - 2,
        vx: rand(-2.5, 2.5) + (c - 2) * 0.15,
        vy: rand(-2.8, 1.2) + (r - 1) * 0.2,
        rot: rand(-0.1, 0.1),
        vr: rand(-0.03, 0.03),
        alpha: 1
      });
    }
  }

  state.bossRecovery = 120;
  state.enemies = [];
  state.enemyBullets = [];
  state.pendingSpawns = [];
  spawnParticles(boss.x, boss.y, 50, "#fff", 1.1);
  spawnParticles(boss.x, boss.y, 24, "#9ff", 1.0);
  state.fx.shake = 14;
  state.fx.flash = 14;
}

function updateBossStandard() {
  const b = state.boss;
  if (!b) return;
  const threat = state.difficulty.threat;

  if (!b.entered) {
    b.y += 0.7;
    if (b.y >= 92) {
      b.y = 92;
      b.entered = true;
      b.cooldown = 72;
    }
    b.x = clamp(b.x, b.w / 2 + 18, W - b.w / 2 - 18);
    return;
  }

  const hpPct = b.hp / b.maxHp;
  const aggro = 1 + (1 - hpPct) * 0.9;
  const panic = hpPct < 0.15 ? 1.18 : 1;
  b.x += Math.sin(state.frame / (36 - (1 - hpPct) * 10)) * 1.4 * aggro * panic;
  b.x = clamp(b.x, b.w / 2 + 18, W - b.w / 2 - 18);

  if (b.warn > 0) {
    const progress = 1 - (b.warn / Math.max(1, b.warnMax));
    b.mouthOpen = easeOutCubic(progress);
    b.bay = b.warn;
    b.warn--;
    if (b.warn === 0) {
      const attack = b.pending;
      if (attack === "spread") {
        const count = hpPct > 0.7 ? 5 : hpPct > 0.4 ? 7 : 9;
        fireAimedBurst(b.x, b.y + 24, state.player.x, state.player.y, count, hpPct > 0.4 ? 26 : 30, 3.3 + (1 - hpPct) * 0.5, "boss");
      } else if (attack === "aimed") {
        const count = hpPct > 0.7 ? 3 : hpPct > 0.4 ? 4 : 5;
        fireAimedBurst(b.x, b.y + 24, state.player.x, state.player.y, count, hpPct > 0.4 ? 14 : 18, 3.8 + (1 - hpPct) * 0.45, "boss");
      } else if (attack === "fan") {
        const base = Math.atan2(state.player.y - b.y, state.player.x - b.x);
        const spread = hpPct > 0.7 ? 3 : hpPct > 0.4 ? 4 : 5;
        const speedBase = 3.5 + (1 - hpPct) * 0.6;
        for (let i = -spread; i <= spread; i++) {
          fireAngle(b.x, b.y + 24, base + i * (7 * Math.PI / 180), speedBase + Math.abs(i) * 0.1, "boss");
        }
      } else if (attack === "spawn") {
        spawnBossAdds();
        if (hpPct < 0.35 && Math.random() < 0.65) spawnBossAdds();
      }

      b.step = (b.step + 1) % 4;
      b.pending = null;
      b.bay = 0;
      b.mouthOpen = 0;
      b.cooldown = bossCooldown(hpPct, threat);
    }
    return;
  }

  b.mouthOpen = Math.max(0, b.mouthOpen - 0.04);
  b.cooldown--;
  if (b.cooldown <= 0) {
    b.pending = chooseBossAttackType(b, hpPct);
    b.warn = b.pending === "spawn" ? (hpPct < 0.35 ? 24 : 28) : (hpPct < 0.35 ? 14 : 18);
    b.warnMax = b.warn;
    b.bay = b.warn;
  }
}

function updateBossWraith() {
  const b = state.boss;
  if (!b) return;
  const p = state.player;
  const hpPct = b.hp / b.maxHp;

  if (!b.entered) {
    b.y += 0.48;
    if (b.y >= 94) {
      b.y = 94;
      b.entered = true;
      b.attackTimer = 50;
    }
    b.x = clamp(b.x, b.w / 2 + 18, W - b.w / 2 - 18);
    return;
  }

  if (b.shiftTelegraph > 0) {
    b.shiftTelegraph--;
    b.flicker = b.shiftTelegraph;
    b.corePulse += 0.02;
    if (b.shiftTelegraph === 0) finishWraithShift(b);
    return;
  }

  if (b.chargeTelegraph > 0) {
    b.chargeTelegraph--;
    b.flicker = 20;
    if (state.playerRealm !== b.chargeStartRealm) b.chargeDodged = true;
    if (b.chargeTelegraph === 0) {
      fireWraithCharge(b);
      if (b.chargeDodged) {
        p.energy = clamp(p.energy + 9, 0, p.maxEnergy);
        spawnParticles(p.x, p.y, 12, "#d9b6ff", 0.8);
      }
      b.chargeRecovery = 20;
      b.attackTimer = wraithAttackCooldown(b);
    }
    return;
  }

  if (b.chargeRecovery > 0) b.chargeRecovery--;

  if (state.phase >= 4) {
    b.phantomSpewTimer--;
    if (b.phantomSpewTimer <= 0) {
      spawnWraithPhantomBurst(b);
      b.phantomSpewTimer = 300 + Math.floor(rand(0, 180));
    }
  }

  const moveAmp = 0.9 + (1 - hpPct) * 3.0;
  const moveSpeed = (b.realm === 0 ? 0.45 : 0.72) + (1 - hpPct) * (b.realm === 0 ? 0.7 : 1.1);
  const lateral = Math.sin(state.frame / (b.realm === 0 ? 56 : 38) + b.movePhase) * moveSpeed * moveAmp;
  const verticalWobble = Math.sin(state.frame * 0.03 + b.movePhase) * (b.realm === 0 ? 0.45 : 0.75);

  if (b.realm === 0) {
    b.x += lateral * 0.9;
  } else {
    b.x += lateral * 1.15 + Math.sin(state.frame * 0.14 + b.movePhase) * 0.18;
  }
  b.y = 94 + verticalWobble;
  b.x = clamp(b.x, b.w / 2 + 18, W - b.w / 2 - 18);

  if (state.playerRealm === b.realm) b.passiveTimer = 0;
  else b.passiveTimer++;

  if (!b.shift60Triggered && b.hp <= b.maxHp * 0.6) {
    b.shift60Triggered = true;
    startWraithShift(b, "threshold");
  }
  if (!b.shift30Triggered && b.hp <= b.maxHp * 0.3) {
    b.shift30Triggered = true;
    startWraithShift(b, "threshold");
  }

  if (b.passiveTimer >= 540) {
    startWraithShift(b, "passive");
  }

  b.attackTimer--;
  if (b.attackTimer <= 0) {
    const chargeChance = hpPct < 0.2 ? 0.60 : (hpPct < 0.4 ? 0.45 : hpPct < 0.7 ? 0.28 : 0.18);
    if (Math.random() < chargeChance && b.chargeRecovery <= 0) {
      b.chargeTelegraph = hpPct < 0.4 ? 48 : 42;
      b.chargeStartRealm = state.playerRealm;
      b.chargeDodged = false;
      b.attackTimer = wraithAttackCooldown(b) + 10;
    } else {
      fireWraithVolley(b);
      b.attackTimer = wraithAttackCooldown(b);
    }
  }

  b.corePulse += 0.03;
  b.flicker = Math.max(0, b.flicker - 1);
}

function updateBoss() {
  if (!state.boss) return;
  if (state.boss.mode === "wraith") updateBossWraith();
  else updateBossStandard();
}

function updateBossDeathIfNeeded() {
  const d = state.bossDeath;
  if (!d) return;

  d.timer++;
  state.fx.shake = Math.max(state.fx.shake, d.timer < 24 ? 8 : 4);

  if (d.timer % 3 === 0) spawnParticles(d.x, d.y, 3, "#fff", 0.7);
  if (d.timer % 6 === 0) spawnParticles(d.x + rand(-24, 24), d.y + rand(-12, 12), 8, "#9ff", 0.9);
  if (d.timer % 12 === 0) spawnParticles(d.x, d.y, 16, "#fff", 1.1);

  for (const p of d.pieces) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.985;
    p.vy += 0.04;
    p.rot += p.vr;
    p.alpha = clamp(1 - d.timer / d.life, 0, 1);
  }

  if (d.timer >= d.life) state.bossDeath = null;
}

function resolveEnemySpacing() {
  const margin = 20;
  const active = [];
  for (const e of state.enemies) {
    if (!e.escape && e.launchFrames <= 0 && e.spawnMode !== "boss") active.push(e);
  }

  for (let i = 0; i < active.length; i++) {
    const a = active[i];
    for (let j = i + 1; j < active.length; j++) {
      const b = active[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = a.r + b.r + 8;

      if (dist > 0.001 && dist < minDist) {
        const push = (minDist - dist) / dist * 0.28;
        const ax = dx * push * 0.5;
        const ay = dy * push * 0.5;
        a.x -= ax;
        a.y -= ay;
        b.x += ax;
        b.y += ay;
      }
    }
  }

  for (const e of state.enemies) {
    e.x = clamp(e.x, margin, W - margin);
  }
}

function updateEnemies() {
  const margin = 20;
  const p = state.player;
  const threat = state.difficulty.threat;
  const purpleCrowd = activePurpleCount();

  for (const e of state.enemies) {
    e.prevX = e.x;
    e.prevY = e.y;
    if (e.flash > 0) e.flash--;
    e.hitFlash = Math.max(0, (e.hitFlash || 0) - 1);
    e.hitPulse = Math.max(0, (e.hitPulse || 0) - 0.12);

    if (e.entryFrames > 0 && e.spawnMode !== "boss") {
      e.entryFrames--;
      e.y += 0.62;
      e.x += Math.sin((state.frame + e.id) * 0.06) * (e.type === "orange" ? 0.26 : 0.14);
      if (e.type === "purple") e.x += Math.sign(p.x - e.x) * 0.08;
      continue;
    }

    if (e.spawnMode === "boss") {
      if (e.spawnPhase === "emerge") {
        const t = 1 - (e.spawnTimer / 18);
        const eased = easeOutCubic(clamp(t, 0, 1));
        e.x = e.spawnOriginX + Math.sin(state.frame * 0.08 + e.loopPhase) * 2.5;
        e.y = e.spawnOriginY + eased * 20;
        e.spawnTimer--;
        if (e.spawnTimer <= 0) {
          e.spawnPhase = "launch";
          e.spawnTimer = e.launchTimer;
          e.launchFromX = e.x;
          e.launchFromY = e.y;
        }
        continue;
      }

      if (e.spawnPhase === "launch") {
        const t = 1 - (e.spawnTimer / e.launchTimer);
        const eased = easeOutCubic(clamp(t, 0, 1));
        e.x = e.launchFromX + (e.spawnTargetX - e.launchFromX) * eased;
        e.y = e.launchFromY + (e.spawnTargetY - e.launchFromY) * eased;

        e.spawnTimer--;
        if (e.spawnTimer <= 0) {
          e.spawnMode = null;
          e.spawnPhase = null;
          e.x = e.spawnTargetX;
          e.y = e.spawnTargetY;
          e.recover = 18;
          e.vx = 0;
          e.vy = (e.type === "orange" ? 2.9 : (e.type === "purple" ? 1.2 : 2.0)) + state.phase * 0.04;
          e.turnTimer = rand(10, 28);
          e.driftPhase = rand(0, TAU);
          e.driftDir = Math.random() < 0.5 ? -1 : 1;
        }
        continue;
      }
    }

    if (e.launchFrames > 0) {
      e.x += e.launchVX;
      e.y += e.launchVY;
      e.launchFrames--;
      e.x = clamp(e.x, margin, W - margin);
      continue;
    }

    if (!e.escape) {
      const moveScale = 0.92 + threat * 0.08;
      if (e.recover > 0) e.recover--;

      if (e.type === "red") {
        e.t += 1;
        if (Math.random() < 0.012) e.driftDir *= -1;
        e.x += Math.sin(e.t * 0.03 + e.driftPhase) * e.driftPower * e.driftDir;
        e.y += e.vy * moveScale;
      } else if (e.type === "orange") {
        e.t += 1;
        const t = e.t;

        if (e.turnTimer <= 0) {
          e.turnTimer = rand(12, 34);
          const edgeBiasLeft = e.x > W * 0.5;
          const r = Math.random();

          if (e.motion === "snap" || r > 0.83) {
            e.turnDir = Math.random() < 0.5 ? -1 : 1;
            if (e.x < margin + 48) e.turnDir = 1;
            if (e.x > W - margin - 48) e.turnDir = -1;
            e.snapTimer = rand(8, 16);
          } else {
            e.snapTimer = 0;
            if (r < 0.50) e.turnDir = Math.random() < 0.5 ? -1 : 1;
            else if (r < 0.72) e.turnDir = edgeBiasLeft ? -1 : 1;
            else e.turnDir = edgeBiasLeft ? 1 : -1;
          }

          const vyBase = 2.25 + state.phase * 0.12;
          const vxBase = 2.4 + state.phase * 0.22;

          if (e.motion === "zigzag") {
            e.vx = (Math.random() < 0.5 ? -1 : 1) * (vxBase + rand(0.2, 2.0));
            e.vy = vyBase + rand(0.1, 0.8);
          } else if (e.motion === "burst") {
            e.vx = (e.turnDir || 1) * (vxBase + rand(1.2, 2.7));
            e.vy = vyBase + rand(0.2, 0.9);
          } else if (e.motion === "chain") {
            e.vx = (Math.random() < 0.5 ? -1 : 1) * (vxBase + rand(0.4, 1.8));
            e.vy = vyBase + rand(0.15, 0.7);
          } else if (e.motion === "sweep") {
            e.vx = (e.turnDir || 1) * (vxBase + rand(1.0, 2.4));
            e.vy = vyBase + rand(0.25, 0.95);
          } else {
            e.vx = (e.turnDir || 1) * (vxBase + rand(0.8, 2.2));
            e.vy = vyBase + rand(0.15, 0.8);
          }
        }

        e.turnTimer--;

        if (e.snapTimer > 0) {
          e.snapTimer--;
          e.vx += (e.turnDir || 1) * 0.45;
        } else {
          e.vx += Math.sin(t * 0.14 + e.loopPhase) * 0.03;
        }

        if (e.motion === "chain") {
          const wave = Math.sin(t * 0.09 + e.loopPhase) * 0.9;
          const weave = Math.sin(t * 0.04 + e.loopPhase * 1.2) * 1.2;
          e.vx += wave + weave * 0.35;
          if (Math.random() < 0.008 + state.phase * 0.0005) e.turnDir *= -1;
        }

        if (e.motion === "sweep") {
          if (Math.random() < 0.02) e.vx += (Math.random() < 0.5 ? -1 : 1) * rand(0.8, 2.0);
        }

        if (e.x <= margin) {
          e.x = margin;
          e.turnDir = 1;
          e.turnTimer = Math.min(e.turnTimer, 10);
        }
        if (e.x >= W - margin) {
          e.x = W - margin;
          e.turnDir = -1;
          e.turnTimer = Math.min(e.turnTimer, 10);
        }

        e.x += e.vx * 0.40;
        e.y += e.vy * moveScale;

        if (Math.random() < 0.006 + state.phase * 0.0006) {
          e.vx += (Math.random() < 0.5 ? -1 : 1) * rand(1.0, 2.0);
        }
      } else if (e.type === "purple") {
        e.t += 1;
        if (Math.random() < 0.01) e.driftDir *= -1;
        e.x += Math.sin(e.t * 0.035 + e.driftPhase) * e.driftPower * 0.8 * e.driftDir;
        e.x += Math.sign(p.x - e.x) * 0.34;
        e.y += e.vy * moveScale;

        const purpleCap = state.phase >= 10 ? 4 : 6;
        if (e.recover <= 0) {
          if (e.warn > 0) {
            e.warn--;
            if (e.warn === 0) {
              const dx = p.x - e.x;
              const dy = p.y - e.y;
              const aimAngle = Math.atan2(dy, dx);
              const forwardAngle = Math.atan2(Math.max(0.001, e.vy), e.vx || 0.001);
              const arcOK = Math.abs(wrapAngle(aimAngle - forwardAngle)) <= Math.PI / 2;

              if (countBulletsByKind("purple") >= purpleCap) {
                e.warn = 12;
              } else if (arcOK) {
                const d = Math.max(1, Math.hypot(dx, dy));
                const speed = 3.4 + state.phase * 0.06;
                const extraDelay = Math.floor((purpleCrowd - 1) * 10) + (e.volleySeed || 0) * 6;
                e.shoot = Math.max(76, 102 - state.phase * 2 - Math.floor(threat * 7) + extraDelay + Math.floor(rand(0, 10)));
                fireEnemyBullet(e.x, e.y + 12, (dx / d) * speed, (dy / d) * speed, "purple");
              } else {
                e.warn = 20;
              }
            }
          } else {
            e.shoot--;
            if (e.shoot <= 18) {
              e.warn = 16;
            }
          }
        }
      } else if (e.type === "phantom") {
        e.t += 1;

        if (e.telegraphTimer > 0) {
          e.telegraphTimer--;
          e.y += e.vy * 0.55;
          e.x += Math.sin(e.t * 0.03 + e.phaseOffset) * 0.08;
          if (e.telegraphTimer === 0) {
            e.stateMode = (e.stateMode === "physical") ? "ghost" : "physical";
            e.cycleTimer = phantomCycleDuration(e.stateMode) + Math.floor(rand(-12, 12));
            e.fireTimer = Math.max(18, e.fireTimer + Math.floor(rand(-12, 18)));
          }
        } else {
          e.cycleTimer--;
          if (e.cycleTimer <= 0) {
            e.telegraphTimer = 20;
          }
          e.y += e.vy * moveScale;
          e.x += Math.sin(e.t * 0.028 + e.phaseOffset) * e.driftPower * 0.75;
          e.x += Math.sign(p.x - e.x) * (e.stateMode === "physical" ? 0.14 : 0.09);
          if (Math.random() < 0.012) e.driftDir *= -1;
        }

        e.x = clamp(e.x, margin, W - margin);

        e.fireTimer--;
        if (e.telegraphTimer <= 0) {
          if (e.stateMode === "physical") {
            if (e.fireTimer <= 0) {
              const dx = p.x - e.x;
              const dy = p.y - e.y;
              const d = Math.max(1, Math.hypot(dx, dy));
              const speed = 2.6 + state.phase * 0.03;
              if (phantomFrontArcOK(e, p.x, p.y)) {
                fireEnemyBullet(e.x, e.y + 10, (dx / d) * speed, (dy / d) * speed, "phantomShot", { realm: 0 });
                e.fireTimer = Math.floor(120 + rand(-20, 20));
              } else {
                e.fireTimer = 20;
              }
            }
          } else if (isWraithActive()) {
            if (e.fireTimer <= 0) {
              const dx = p.x - e.x;
              const dy = p.y - e.y;
              const d = Math.max(1, Math.hypot(dx, dy));
              const speed = 2.4 + state.phase * 0.025;
              if (phantomFrontArcOK(e, p.x, p.y)) {
                fireEnemyBullet(e.x, e.y + 10, (dx / d) * speed, (dy / d) * speed, "wraithGhost", { realm: 1 });
                e.fireTimer = Math.floor(185 + rand(-25, 25));
              } else {
                e.fireTimer = 20;
              }
            }
          }
        }
      }

      e.x = clamp(e.x, margin, W - margin);

      if (e.y > H + 18) {
        e.escape = true;
        e.escapeEdge = e.x < W / 2 ? "left" : "right";
        e.x = e.escapeEdge === "left" ? margin : W - margin;
        e.y = H + 10;
      }
    } else {
      e.y -= 11.5;
      e.x = e.escapeEdge === "left" ? margin : W - margin;

      if (e.y < -34) {
        e.escape = false;
        e.y = -28;
        e.x = rand(margin, W - margin);
        e.recover = 24;
        e.warn = 0;
        if (e.type === "orange") e.turnDir = Math.random() < 0.5 ? -1 : 1;
        if (e.type === "purple") e.shoot = 72 + Math.floor(rand(0, 22));
      }
    }
  }

  resolveEnemySpacing();
  state.enemies = state.enemies.filter(e => e.hp > 0);
}

function updatePowerups() {
  for (const p of state.powerups) {
    const nearPlayer = Math.hypot(p.x - state.player.x, p.y - state.player.y) < 140;
    p.y += p.vy * (nearPlayer ? 0.88 : 1);
    p.x += Math.sin((state.frame + p.y) / 18) * 1.0;
    p.x = clamp(p.x, 16, W - 16);

    p.life--;
    if (p.y > H - 90) p.life = Math.max(p.life, 90);
    if (p.y > H + 30) p.dead = true;
    if (p.life <= 0) p.dead = true;
  }
  state.powerups = state.powerups.filter(p => !p.dead);
}

function updateParticles() {
  for (const p of state.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life--;
  }
  state.particles = state.particles.filter(p => p.life > 0);
  enforceParticleCap();
}

function damagePlayer(amount = 1) {
  const p = state.player;
  if (p.inv > 0) return;

  const d = state.difficulty;
  if (state.frame - d.lastHitFrame <= 180) d.heatStreak = true;
  d.lastHitFrame = state.frame;

  p.hp -= amount;
  p.inv = amount >= 2 ? 70 : 60;
  p.energy = clamp(p.energy + 12, 0, p.maxEnergy);

  state.difficulty.grace = 120;
  state.difficulty.ghostGrace = 0;
  state.fx.shake = Math.max(state.fx.shake, amount >= 2 ? 12 : 8);
  state.fx.flash = Math.max(state.fx.flash, amount >= 2 ? 10 : 8);
  resetCombo();

  spawnParticles(p.x, p.y, amount >= 2 ? 18 : 12, "#ff8a8a", 1.05);
  if (p.hp <= 0) enterGameOver();
}

function collectPowerup(pu) {
  const p = state.player;

  if (pu.type === "spread") {
    p.spread = Math.max(p.spread, 900);
    showMessage("SPREAD SHOT", 90);
  } else if (pu.type === "rapid") {
    p.rapid = Math.max(p.rapid, 900);
    showMessage("RAPID FIRE", 90);
  } else if (pu.type === "repair") {
    p.hp = Math.min(p.maxHp, p.hp + 1);
    showMessage("REPAIR +1", 90);
  } else if (pu.type === "wingman") {
    spawnWingmen(1);
    showMessage("WINGMAN", 90);
  } else if (pu.type === "dual") {
    spawnWingmen(2);
    showMessage("DUAL WING", 90);
  }
}

function enemyScoreForType(type) {
  return (ENEMY_DATA[type] && ENEMY_DATA[type].score) ? ENEMY_DATA[type].score : 20;
}

function applyEnemyHitFeedback(e) {
  e.hitFlash = 12;
  e.hitPulse = 1;
}

function bossCollisionHits(bullet, boss) {
  const origin = { x: boss.x, y: boss.y - ((boss.recoil || 0) * 0.35) };
  const circles = boss.mode === "wraith" ? [
    { x: origin.x, y: origin.y, r: 28 },
    { x: origin.x - 36, y: origin.y + 2, r: 18 },
    { x: origin.x + 36, y: origin.y + 2, r: 18 },
    { x: origin.x - 12, y: origin.y - 18, r: 15 },
    { x: origin.x + 12, y: origin.y - 18, r: 15 }
  ] : [
    { x: origin.x, y: origin.y, r: 28 },
    { x: origin.x - 34, y: origin.y, r: 18 },
    { x: origin.x + 34, y: origin.y, r: 18 },
    { x: origin.x, y: origin.y - 14, r: 16 },
    { x: origin.x, y: origin.y + 12, r: 20 }
  ];

  for (const c of circles) {
    if (circleHit(bullet.x, bullet.y, bullet.r, c.x, c.y, c.r)) return true;
  }
  return false;
}

function updateCollisions() {
  const p = state.player;

  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];

    if (state.boss) {
      if (state.boss.mode === "wraith") {
        if ((b.realm == null || b.realm === state.playerRealm) && b.kind === (state.boss.realm === 0 ? "physical" : "ghost") && bossCollisionHits(b, state.boss)) {
          state.boss.hp--;
          b.life = 0;
          p.energy = clamp(p.energy + 5, 0, p.maxEnergy);
          state.boss.hitsSinceShift++;
          spawnParticles(b.x, b.y, 8, "#fff", 0.8);
          if (state.boss.hp <= 0) {
            const deadBoss = state.boss;
            spawnBossDeath(deadBoss);
            addFlatScore(BOSS_SCORE.wraith);
            resetCombo();
            bossRewardDrops(deadBoss.x, deadBoss.y);
            registerPowerupDrop(300, 480);
            state.boss = null;
            state.phase++;
            state.phaseTimer = 0;
            state.waveTimer = 0;
            state.waveRest = 18;
            state.playerRealm = 0;
            saveMilestone();
            showMessage("BOSS DOWN", 90);
            showMessage("PHASE CLEAR", 75);
            showMessage("PHASE " + state.phase, 90);
          } else if (!state.boss.shiftTelegraph && !state.boss.chargeTelegraph && state.boss.hitsSinceShift >= state.boss.nextShiftHits) {
            startWraithShift(state.boss, "damage");
          }
          continue;
        }
      } else if (state.boss.mode === "standard") {
        if (bossCollisionHits(b, state.boss)) {
          state.boss.hp--;
          b.life = 0;
          spawnParticles(b.x, b.y, 4, "#fff", 0.8);
          if (state.boss.hp <= 0) {
            const deadBoss = state.boss;
            spawnBossDeath(deadBoss);
            addFlatScore(BOSS_SCORE.standard);
            resetCombo();
            bossRewardDrops(deadBoss.x, deadBoss.y);
            registerPowerupDrop(300, 480);
            state.boss = null;
            state.phase++;
            state.phaseTimer = 0;
            state.waveTimer = 0;
            state.waveRest = 18;
            state.playerRealm = 0;
            saveMilestone();
            showMessage("BOSS DOWN", 90);
            showMessage("PHASE CLEAR", 75);
            showMessage("PHASE " + state.phase, 90);
          }
          continue;
        }
      }
    }

    for (let j = state.enemies.length - 1; j >= 0; j--) {
      const e = state.enemies[j];

      if (e.type === "phantom") {
        if (e.telegraphTimer > 0) continue;
        const bulletIsGhost = b.kind === "ghost";
        const phantomIsGhost = e.stateMode === "ghost";
        if (bulletIsGhost !== phantomIsGhost) continue;
      }

      if (circleHit(b.x, b.y, b.r, e.x, e.y, e.r)) {
        b.life = 0;
        e.hp--;
        applyEnemyHitFeedback(e);
        spawnParticles(b.x, b.y, 6, "#fff", 0.7);

        if (e.hp <= 0) {
          noteKill(e.reward || enemyScoreForType(e.type));
          spawnDeathBurst(e.x, e.y, e.type === "purple" ? 22 : e.type === "phantom" ? 18 : 14);

          if (shouldDropPowerupNow()) {
            dropPowerup(e.x, e.y);
            registerPowerupDrop(240, 360);
          } else {
            state.killsSinceLastDrop++;
          }

          state.enemies.splice(j, 1);
        }
        break;
      }
    }
  }

  for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
    const b = state.enemyBullets[i];

    if (b.realm != null && b.realm !== state.playerRealm) continue;

    let wingmanBlocked = false;
    for (let w = state.wingmen.length - 1; w >= 0; w--) {
      const wm = state.wingmen[w];
      if (circleHit(b.x, b.y, b.r, wm.x, wm.y, 12)) {
        state.enemyBullets.splice(i, 1);
        state.wingmen.splice(w, 1);
        spawnParticles(wm.x, wm.y, 10, "#f6f", 0.8);
        wingmanBlocked = true;
        break;
      }
    }
    if (wingmanBlocked) continue;

    if (state.boss && state.boss.mode === "wraith" && (b.kind === "wraithPhysical" || b.kind === "wraithGhost")) {
      if (circleHit(b.x, b.y, b.r, p.x, p.y, 14) && p.inv <= 0) {
        state.enemyBullets.splice(i, 1);
        damagePlayer(b.damage || 1);
      }
      continue;
    }

    if (circleHit(b.x, b.y, b.r, p.x, p.y, 14) && p.inv <= 0) {
      state.enemyBullets.splice(i, 1);
      damagePlayer(b.damage || 1);
    }
  }

  for (let i = state.enemies.length - 1; i >= 0; i--) {
    const e = state.enemies[i];

    let wingmanHit = false;
    for (let w = state.wingmen.length - 1; w >= 0; w--) {
      const wm = state.wingmen[w];
      if (circleHit(e.x, e.y, e.r, wm.x, wm.y, 12)) {
        state.wingmen.splice(w, 1);
        state.enemies.splice(i, 1);
        spawnParticles(wm.x, wm.y, 12, "#f6f", 0.9);
        spawnDeathBurst(e.x, e.y, 10);
        wingmanHit = true;
        break;
      }
    }
    if (wingmanHit) continue;

    if (e.type === "phantom") {
      if (isWraithActive()) {
        if (e.telegraphTimer > 0) continue;
        const playerIsGhost = state.playerRealm === 1;
        const phantomIsGhost = e.stateMode === "ghost";
        if (playerIsGhost !== phantomIsGhost) continue;
      } else if (p.ghostTimer > 0) {
        continue;
      }
    }

    if (circleHit(e.x, e.y, e.r, p.x, p.y, 14) && p.inv <= 0) {
      state.enemies.splice(i, 1);
      damagePlayer(1);
    }
  }

  for (let i = state.powerups.length - 1; i >= 0; i--) {
    const pu = state.powerups[i];
    if (circleHit(pu.x, pu.y, pu.size, p.x, p.y, 15)) {
      collectPowerup(pu);
      state.powerups.splice(i, 1);
    }
  }
}

function updatePendingSpawns() {
  for (let i = state.pendingSpawns.length - 1; i >= 0; i--) {
    const s = state.pendingSpawns[i];
    s.delay--;
    if (s.delay <= 0) {
      spawnEnemy(s.type, s.x, s.y, s.extra || {});
      state.pendingSpawns.splice(i, 1);
    }
  }
}

function updateWavesAndPhaseAndPressure() {
  if (state.bossRecovery > 0) {
    state.bossRecovery--;
    updatePressure();
    state.threatScore = calculateThreatScore();
    updateDifficulty();
    state.cachedBulletPressure = enemyBulletPressure();
    state.cachedBulletBudget = enemyBulletBudget();
    state.frameBulletSpent = 0;
    updatePendingSpawns();
    return;
  }

  const bossLocked = !!(state.boss || state.bossDeath);

  if (!bossLocked) {
    state.phaseTimer++;
    state.waveTimer++;
    if (state.waveRest > 0) state.waveRest--;
  }

  updateIntensityCycle();

  const sinceHit = state.frame - state.difficulty.lastHitFrame;
  const strongPerformance = sinceHit > 720 && state.difficulty.killStreak >= 5 && !bossLocked;
  if (strongPerformance) {
    state.phaseTimer += 0.35;
    state.waveTimer += 0.15;
  }
  if (state.intensityPhase === "surge") {
    state.phaseTimer += 0.10;
    state.waveTimer += 0.10;
  }

  updatePressure();
  state.threatScore = calculateThreatScore();
  updateDifficulty();

  state.cachedBulletPressure = enemyBulletPressure();
  state.cachedBulletBudget = enemyBulletBudget();
  state.frameBulletSpent = 0;

  if (bossLocked) {
    updatePendingSpawns();
    return;
  }

  if (state.phaseTimer >= phaseDuration(state.phase)) {
    state.phase++;
    state.phaseTimer = 0;
    state.waveTimer = 0;
    state.waveRest = 18;
    showMessage("PHASE " + state.phase, 100);
    saveMilestone();
    if (state.phase % 4 === 0) spawnBoss();
  }

  let baseInterval;
  if (state.phase === 1) baseInterval = state.phaseTimer < 500 ? 118 : state.phaseTimer < 900 ? 104 : 92;
  else baseInterval = Math.max(38, 88 - state.phase * 3.5);

  const rhythm = rhythmProfile();
  baseInterval += rhythm.interval;

  if (state.intensityPhase === "surge") baseInterval *= 0.78;
  if (state.intensityPhase === "cooldown") baseInterval *= 1.18;

  if (state.difficulty.grace > 0) baseInterval += 10;
  if (state.difficulty.ghostGrace > 0) baseInterval += 8;
  if (state.player.hp <= 2) baseInterval += 8;
  if (state.player.hp === 1) baseInterval += 6;
  if (state.boss) baseInterval += 12;
  if (state.waveRest > 0) baseInterval += Math.floor(state.waveRest * 0.5);

  const load = peakLoad();
  baseInterval += Math.round(load * 18);
  baseInterval += Math.round((state.pressure - 50) * 0.08);

  const interval = Math.round(baseInterval / clamp(state.difficulty.threat, 0.75, 1.20));
  const threatBudget = 11.5 + state.phase * 2.8 + (state.intensityPhase === "surge" ? 0.8 : state.intensityPhase === "cooldown" ? -0.8 : 0);

  if (!state.boss && state.pendingSpawns.length === 0 && state.waveTimer >= interval && state.threatScore < threatBudget) {
    spawnWave();
    state.waveTimer = 0;
  }

  updatePendingSpawns();
}

function update() {
  if (devSkipCooldown > 0) devSkipCooldown--;

  if (state.gameState !== "playing") {
    updateStars();
    updateParticles();
    return;
  }

  state.frame++;
  state.framesSinceLastDrop++;
  if (state.powerupDropCooldown > 0) state.powerupDropCooldown--;

  state.comboPulse = Math.max(0, state.comboPulse - 1);
  updateStars();
  updateWavesAndPhaseAndPressure();
  updatePlayer();
  updateWingmen();
  updateBullets();
  updateEnemies();
  updateBoss();
  updateBossDeathIfNeeded();
  updatePowerups();
  updateCollisions();
  updateParticles();

  state.fx.shake = Math.max(0, state.fx.shake - 0.7);
  state.fx.flash = Math.max(0, state.fx.flash - 0.8);

  if (state.messageTimer > 0) {
    state.messageTimer--;
    if (state.messageTimer <= 0) {
      showNextMessage();
    }
  } else if (state.messageQueue.length > 0 && !state.message) {
    showNextMessage();
  }
}

function drawBackground() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "rgba(255,255,255,0.85)";
  for (const s of state.stars) ctx.fillRect(s.x, s.y, s.s, s.s);

  ctx.fillStyle = "rgba(255,255,255,0.04)";
  for (let y = 0; y < H; y += 36) ctx.fillRect(0, y, W, 1);

  if (isWraithActive()) {
    const tint = state.playerRealm === 0 ? "rgba(170,210,255,0.10)" : "rgba(125,70,200,0.16)";
    ctx.fillStyle = tint;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawPlayer() {
  const p = state.player;
  if (state.gameState !== "playing" && state.gameState !== "gameover") return;

  const tilt = clamp(p.vx / 80, -0.06, 0.06);
  const bob = Math.sin(state.frame * 0.18 + p.x * 0.02) * 0.6;

  if (isWraithActive()) {
    const normal = state.playerRealm === 0;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(tilt);
    ctx.globalAlpha = normal ? 1 : 0.62;
    ctx.shadowColor = normal ? "rgba(210,240,255,0.65)" : "rgba(225,180,255,0.65)";
    ctx.shadowBlur = normal ? 8 : 12;

    ctx.fillStyle = normal ? "#f2fbff" : "rgba(220,190,255,0.90)";
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(-12, 14);
    ctx.lineTo(0, 9);
    ctx.lineTo(12, 14);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = normal ? "#7fd7ff" : "rgba(240,220,255,0.85)";
    ctx.fillRect(-4, -7, 8, 18);

    ctx.globalAlpha = normal ? 0.85 : 0.6;
    ctx.fillStyle = normal ? "rgba(140,220,255,0.8)" : "rgba(220,180,255,0.8)";
    ctx.beginPath();
    ctx.moveTo(-10, 9);
    ctx.lineTo(-20, 16);
    ctx.lineTo(-8, 12);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, 9);
    ctx.lineTo(20, 16);
    ctx.lineTo(8, 12);
    ctx.fill();

    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    return;
  }

  if (p.ghostTimer > 0) {
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(tilt);
    ctx.globalAlpha = 0.42;
    ctx.shadowColor = "rgba(100,255,255,0.8)";
    ctx.shadowBlur = 10;

    ctx.fillStyle = "#2ef";
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(-12, 14);
    ctx.lineTo(0, 9);
    ctx.lineTo(12, 14);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#9ff";
    ctx.fillRect(-4, -7, 8, 18);
    ctx.fillStyle = "rgba(150,255,255,0.9)";
    ctx.fillRect(-14, 4, 8, 4);
    ctx.fillRect(6, 4, 8, 4);

    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    return;
  }

  const blink = p.inv > 0 && Math.floor(state.frame / 5) % 2 === 0;
  if (blink) return;

  ctx.save();
  ctx.translate(p.x, p.y + bob);
  ctx.rotate(tilt);
  ctx.fillStyle = "#2ef";
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-12, 14);
  ctx.lineTo(0, 9);
  ctx.lineTo(12, 14);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#9ff";
  ctx.fillRect(-4, -7, 8, 18);
  ctx.fillStyle = "rgba(130,255,240,0.9)";
  ctx.fillRect(-14, 5, 8, 4);
  ctx.fillRect(6, 5, 8, 4);

  const flame = 5 + Math.sin(state.frame * 0.35) * 1.5;
  ctx.fillStyle = "rgba(120,255,200,0.9)";
  ctx.beginPath();
  ctx.moveTo(-3, 12);
  ctx.lineTo(0, 12 + flame);
  ctx.lineTo(3, 12);
  ctx.fill();

  ctx.restore();
}

function drawWingmen() {
  const alpha = state.player && state.player.ghostTimer > 0 ? 0.42 : 1;
  for (const w of state.wingmen) {
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.globalAlpha = alpha;
    if (state.player && state.player.ghostTimer > 0) {
      ctx.shadowColor = "rgba(100,255,255,0.8)";
      ctx.shadowBlur = 10;
    }
    ctx.fillStyle = "#f6f";
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(-8, 8);
    ctx.lineTo(0, 5);
    ctx.lineTo(8, 8);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillRect(-2, -5, 4, 10);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

function drawBullets() {
  for (const b of state.bullets) {
    if (b.kind === "ghost") {
      ctx.save();
      ctx.shadowColor = "rgba(220,190,255,0.9)";
      ctx.shadowBlur = 10;
      ctx.fillStyle = "rgba(225,205,255,0.95)";
      ctx.beginPath();
      ctx.arc(b.x, b.y + 4, 3.4, 0, TAU);
      ctx.fill();
      ctx.restore();
    } else {
      ctx.fillStyle = "#fff";
      ctx.fillRect(b.x - 2, b.y, 4, 10);
      ctx.fillRect(b.x - 1, b.y - 2, 2, 2);
    }
  }

  for (const b of state.enemyBullets) {
    if (b.kind === "boss") {
      ctx.fillStyle = "#ff5";
      ctx.fillRect(b.x - 3, b.y, 6, 10);
    } else if (b.kind === "aimed") {
      ctx.fillStyle = "#f9f";
      ctx.fillRect(b.x - 3, b.y, 6, 10);
    } else if (b.kind === "phantomShot") {
      ctx.fillStyle = "#0ff";
      ctx.fillRect(b.x - 3, b.y, 6, 10);
    } else if (b.kind === "purple") {
      ctx.fillStyle = "#fc5";
      ctx.fillRect(b.x - 3, b.y, 6, 10);
    } else if (b.kind === "wraithPhysical" || b.kind === "wraithGhost") {
      ctx.save();

      if (b.trail && b.trail.length > 1) {
        for (let i = 1; i < b.trail.length; i++) {
          const a = b.trail[i - 1];
          const c = b.trail[i];
          const alpha = (i / b.trail.length) * 0.35;
          ctx.strokeStyle = b.kind === "wraithPhysical" ? `rgba(255,255,255,${alpha})` : `rgba(220,180,255,${alpha})`;
          ctx.lineWidth = i < b.trail.length - 2 ? 2 : 3;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(c.x, c.y);
          ctx.stroke();
        }
      }

      if (b.kind === "wraithPhysical") {
        const wrongRealm = state.boss && state.boss.mode === "wraith" && b.realm !== state.playerRealm;
        ctx.globalAlpha = wrongRealm ? 0.35 : 0.98;
        ctx.fillStyle = wrongRealm ? "rgba(220,230,255,0.70)" : "rgba(255,255,255,0.98)";
        ctx.fillRect(b.x - 4, b.y - 2, 8, 10);
        ctx.fillRect(b.x - 2, b.y - 4, 4, 14);

        if (wrongRealm) {
          ctx.strokeStyle = "rgba(255,255,255,0.22)";
          ctx.strokeRect(b.x - 5, b.y - 3, 10, 16);
        }
      } else {
        ctx.shadowColor = "rgba(220,170,255,0.9)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "rgba(220,180,255,0.88)";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4.5, 0, TAU);
        ctx.fill();
      }

      ctx.restore();

      if (state.boss && state.boss.mode === "wraith" && b.kind === "wraithGhost" && state.boss.hp / state.boss.maxHp <= 0.4 && b.realm !== state.playerRealm) {
        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 6.8, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }
    } else {
      ctx.fillStyle = "#fc5";
      ctx.fillRect(b.x - 3, b.y, 6, 10);
    }
  }
}

function drawEnemyFlame(yOffset, width, height, phase, alpha = 0.42) {
  const flicker = 1 + Math.sin(state.frame * 0.35 + phase) * 0.18;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "rgba(255,165,90,0.55)";
  ctx.beginPath();
  ctx.moveTo(-width / 2, yOffset);
  ctx.lineTo(0, yOffset + height * flicker);
  ctx.lineTo(width / 2, yOffset);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawEnemies() {
  for (const e of state.enemies) {
    const scale = 1 + Math.min(0.12, (e.hitPulse || 0) * 0.08);
    const hitMix = clamp((e.hitFlash || 0) / 12, 0, 1);
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.scale(scale, scale);

    const dx = e.x - (e.prevX || e.x);
    const dy = e.y - (e.prevY || e.y);
    const bank = clamp(dx * 0.06, -0.28, 0.28);
    const sway = Math.sin(state.frame * 0.10 + e.loopPhase) * 0.05;

    ctx.rotate(bank + sway);
    if (!e.escape) ctx.scale(1, -1);

    if (e.type === "red") {
      const body = mixHex("#e44", "#ff9c9c", hitMix * 0.25);
      const wing = mixHex("#a11", "#f5b0b0", hitMix * 0.2);
      const core = mixHex("#fff", "#ffd0d0", hitMix * 0.16);
      const glow = 0.12 + hitMix * 0.08;

      ctx.shadowColor = `rgba(255,120,120,${glow})`;
      ctx.shadowBlur = 6;

      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(0, -14);
      ctx.lineTo(-12, 6);
      ctx.lineTo(0, 12);
      ctx.lineTo(12, 6);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = wing;
      ctx.beginPath();
      ctx.moveTo(-12, 4);
      ctx.lineTo(-20, 10);
      ctx.lineTo(-9, 8);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(12, 4);
      ctx.lineTo(20, 10);
      ctx.lineTo(9, 8);
      ctx.fill();

      ctx.fillStyle = core;
      ctx.fillRect(-3, -5, 6, 10);
      ctx.fillStyle = mixHex("#b22", "#ffbdbd", hitMix * 0.22);
      ctx.fillRect(-4, 8, 8, 3);

      ctx.fillStyle = "rgba(255,240,220,0.85)";
      ctx.fillRect(-2, 12, 4, 4);

      drawEnemyFlame(13, 6, 6, e.loopPhase, 0.45);
    } else if (e.type === "orange") {
      const body = mixHex("#f93", "#ffd39b", hitMix * 0.25);
      const canopy = mixHex("#fff", "#fff0da", hitMix * 0.18);

      ctx.shadowColor = `rgba(255,170,90,${0.12 + hitMix * 0.08})`;
      ctx.shadowBlur = 6;

      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(-10, 10);
      ctx.lineTo(0, 14);
      ctx.lineTo(10, 10);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = mixHex("#c60", "#ffcc80", hitMix * 0.22);
      ctx.beginPath();
      ctx.moveTo(-10, 8);
      ctx.lineTo(-18, 13);
      ctx.lineTo(-8, 11);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(10, 8);
      ctx.lineTo(18, 13);
      ctx.lineTo(8, 11);
      ctx.fill();

      ctx.fillStyle = canopy;
      ctx.fillRect(-3, -4, 6, 8);
      ctx.fillStyle = mixHex("#a50", "#ffe5bf", hitMix * 0.18);
      ctx.fillRect(-2, 12, 4, 2);

      drawEnemyFlame(12, 6, 5, e.loopPhase, 0.42);
    } else if (e.type === "purple") {
      const body = mixHex("#b4f", "#d7c4ff", hitMix * 0.20);
      const side = mixHex("#7213b0", "#f0ddff", hitMix * 0.18);

      ctx.shadowColor = `rgba(190,120,255,${0.10 + hitMix * 0.08})`;
      ctx.shadowBlur = 7;

      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.lineTo(-14, -4);
      ctx.lineTo(-10, 12);
      ctx.lineTo(10, 12);
      ctx.lineTo(14, -4);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = side;
      ctx.fillRect(-20, -3, 8, 10);
      ctx.fillRect(12, -3, 8, 10);

      ctx.fillStyle = "#fff";
      ctx.fillRect(-4, -7, 8, 14);

      if (e.warn > 0) {
        ctx.strokeStyle = "rgba(255,255,255,0.8)";
        ctx.beginPath();
        ctx.arc(0, 0, e.r + 4, 0, TAU);
        ctx.stroke();
      }

      drawEnemyFlame(16, 5, 7, e.loopPhase, 0.34);
    } else if (e.type === "phantom") {
      const alpha = e.telegraphTimer > 0 ? (0.42 + Math.sin((state.frame + e.flickerSeed) * 0.8) * 0.22) : (e.stateMode === "ghost" ? 0.42 : 1);
      ctx.globalAlpha = alpha;
      ctx.shadowColor = "rgba(0,255,255,0.45)";
      ctx.shadowBlur = 8;
      const body = e.stateMode === "ghost" ? mixHex("#00ffff", "#c8ffff", 0.2 + hitMix * 0.2) : mixHex("#00ffff", "#9fffff", hitMix * 0.22);

      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.lineTo(-12, -8);
      ctx.lineTo(-14, 8);
      ctx.lineTo(0, 15);
      ctx.lineTo(14, 8);
      ctx.lineTo(12, -8);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = e.stateMode === "ghost" ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.28)";
      ctx.fillRect(-7, -10, 14, 20);
      ctx.fillStyle = mixHex("#00d0d0", "#efffff", hitMix * 0.18);
      ctx.fillRect(-16, -2, 32, 4);
