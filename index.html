      drawEnemyFlame(14, 6, 5, e.loopPhase, 0.30);

      if (e.telegraphTimer > 0) {
        ctx.strokeStyle = "rgba(255,255,255,0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, e.r + 8, 0, TAU);
        ctx.stroke();
      } else {
        ctx.strokeStyle = e.stateMode === "ghost" ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.20)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, e.r + 6, 0, TAU);
        ctx.stroke();
      }

      ctx.restore();
      continue;
    }

    ctx.restore();
    continue;
  }
}

function drawBoss() {
  const b = state.boss;
  if (!b) return;

  if (b.mode === "wraith") {
    const hpPct = b.hp / b.maxHp;
    const chargePulse = b.chargeTelegraph > 0 ? 1 + Math.sin(state.frame * 0.35) * 0.2 : 1;
    const alphaBase = 0.50 + (1 - hpPct) * 0.18;
    const realmColor = b.realm === 0 ? "rgba(200,235,255,0.55)" : "rgba(210,170,255,0.58)";
    const realmGlow = b.realm === 0 ? "rgba(170,220,255,0.42)" : "rgba(180,120,255,0.48)";
    const flicker = b.shiftTelegraph > 0 ? (0.35 + Math.sin(state.frame * 0.8) * 0.25) : 1;
    const visibleAlpha = alphaBase * flicker;
    const wobble = Math.sin(state.frame * 0.045 + b.movePhase) * 2.2;
    const tilt = Math.sin(state.frame * 0.02 + b.movePhase) * 0.04;

    ctx.save();
    ctx.translate(b.x, b.y + wobble);
    ctx.rotate(tilt);
    ctx.globalAlpha = visibleAlpha;
    ctx.shadowColor = realmGlow;
    ctx.shadowBlur = b.chargeTelegraph > 0 ? 24 : 16;

    ctx.fillStyle = b.realm === 0 ? "rgba(230,245,255,0.92)" : "rgba(225,200,255,0.88)";
    ctx.beginPath();
    ctx.moveTo(0, -40);
    ctx.lineTo(-56, -18);
    ctx.lineTo(-48, 16);
    ctx.lineTo(0, 32);
    ctx.lineTo(48, 16);
    ctx.lineTo(56, -18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.fillRect(-40, -14, 20, 10);
    ctx.fillRect(20, -14, 20, 10);
    ctx.fillRect(-14, 10, 28, 8);

    ctx.fillStyle = b.realm === 0 ? "rgba(110,190,255,0.85)" : "rgba(170,120,240,0.82)";
    ctx.fillRect(-8, -8, 16, 16);

    ctx.strokeStyle = realmColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 50 * chargePulse, 0, TAU);
    ctx.stroke();

    if (b.chargeTelegraph > 0) {
      ctx.strokeStyle = "rgba(255,255,255,0.72)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 62 + Math.sin(state.frame * 0.2) * 2, 0, TAU);
      ctx.stroke();
    }

    if (b.shiftTelegraph > 0) {
      ctx.strokeStyle = b.nextRealm === 0 ? "rgba(200,235,255,0.65)" : "rgba(210,170,255,0.65)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 66 + Math.sin(state.frame * 0.3) * 2, 0, TAU);
      ctx.stroke();
    }

    const coreGlow = 0.6 + Math.sin(state.frame * 0.18) * 0.2 + b.corePulse * 0.08;
    ctx.fillStyle = b.realm === 0 ? `rgba(170,220,255,${0.34 + coreGlow * 0.18})` : `rgba(200,150,255,${0.34 + coreGlow * 0.18})`;
    ctx.beginPath();
    ctx.arc(0, 0, 18 + coreGlow * 4, 0, TAU);
    ctx.fill();

    ctx.strokeStyle = b.realm === 0 ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.16)";
    ctx.beginPath();
    ctx.arc(0, 0, 30 + Math.sin(state.frame * 0.08) * 1.5, 0, TAU);
    ctx.stroke();

    ctx.restore();

    for (let i = 0; i < 3; i++) {
      const ang = state.frame * 0.05 + i * 2.1;
      const r = 56 + Math.sin(state.frame * 0.04 + i) * 4;
      const px = b.x + Math.cos(ang) * r;
      const py = b.y + Math.sin(ang) * 8 + wobble;
      ctx.save();
      ctx.globalAlpha = 0.24;
      ctx.strokeStyle = i === 0 ? "rgba(200,235,255,0.8)" : i === 1 ? "rgba(200,170,255,0.8)" : "rgba(255,255,255,0.6)";
      ctx.beginPath();
      ctx.arc(px, py, 6 + (i % 2) * 2, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }

    const barW = Math.min(320, W - 40), barX = (W - barW) / 2, barY = 16;
    ctx.fillStyle = "rgba(255,255,255,0.16)";
    ctx.fillRect(barX, barY, barW, 10);
    ctx.fillStyle = "#f44";
    ctx.fillRect(barX, barY, barW * hpPct, 10);
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(barX, barY, barW, 10);

    if (b.shiftTelegraph > 0) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.font = "18px Arial";
      const t = "REALM SHIFT";
      const tw = ctx.measureText(t).width;
      ctx.fillStyle = "#fff";
      ctx.fillText(t, (W - tw) / 2, 46);
      ctx.restore();
    }
    return;
  }

  const hpPct = b.hp / b.maxHp;
  const flash = b.warn > 0 && Math.floor(state.frame / 3) % 2 === 0;
  const open = b.pending === "spawn" && b.warnMax > 0 ? b.mouthOpen : 0;
  const mouthEase = easeOutCubic(open);
  const bob = Math.sin(state.frame * 0.05 + b.step) * 1.4;
  const tilt = Math.sin(state.frame * 0.03) * 0.02;

  ctx.save();
  ctx.translate(b.x, b.y + bob);
  ctx.rotate(tilt);
  ctx.shadowColor = "rgba(120,255,255,0.25)";
  ctx.shadowBlur = 12;

  const bodyTop = "#6ff";
  const bodyCore = mixHex("#9ff", "#f7ffff", 0.1);

  ctx.fillStyle = bodyTop;
  ctx.beginPath();
  ctx.moveTo(0, -32);
  ctx.lineTo(-48, -18);
  ctx.lineTo(-40, 16);
  ctx.lineTo(0, 28);
  ctx.lineTo(40, 16);
  ctx.lineTo(48, -18);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#044";
  ctx.beginPath();
  ctx.moveTo(-18, -6);
  ctx.lineTo(-34, -2);
  ctx.lineTo(-18, 4);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(18, -6);
  ctx.lineTo(34, -2);
  ctx.lineTo(18, 4);
  ctx.fill();
  ctx.fillRect(-12, 10, 24, 10);

  ctx.fillStyle = bodyCore;
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, TAU);
  ctx.fill();

  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.fillRect(-8, -9, 16, 8);

  if (b.pending === "spawn" && b.warn > 0) {
    const glow = 0.10 + mouthEase * 0.28;
    ctx.fillStyle = `rgba(255,255,255,${glow})`;
    ctx.fillRect(-26, -10, 52, 20);

    ctx.fillStyle = `rgba(255,255,255,${0.16 + mouthEase * 0.38})`;
    ctx.fillRect(-18, -6, 36, 12);

    ctx.fillStyle = "#033";
    ctx.fillRect(-36 - mouthEase * 18, -18, 22, 18);
    ctx.fillRect(14 + mouthEase * 18, -18, 22, 18);
    ctx.fillRect(-12, 10, 24, 10);

    for (let i = 0; i < 8; i++) {
      const ang = state.frame * 0.14 + i * 0.78;
      const r = 6 + (i % 3) * 3 + mouthEase * 10;
      const px = Math.cos(ang) * r;
      const py = Math.sin(ang * 1.4) * (r * 0.55);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(px, py, 2, 2);
    }
  }

  const corePulse = 0.75 + Math.sin(state.frame * 0.12) * 0.1;
  ctx.fillStyle = "rgba(90,255,255,0.65)";
  ctx.beginPath();
  ctx.arc(0, 0, 16 + corePulse * 3, 0, TAU);
  ctx.fill();

  const flame = 8 + Math.sin(state.frame * 0.24) * 2;
  ctx.fillStyle = "rgba(120,255,220,0.55)";
  ctx.beginPath();
  ctx.moveTo(-18, 22);
  ctx.lineTo(-12, 22 + flame);
  ctx.lineTo(-6, 22);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(18, 22);
  ctx.lineTo(12, 22 + flame);
  ctx.lineTo(6, 22);
  ctx.fill();

  ctx.restore();

  const barW = Math.min(320, W - 40), barX = (W - barW) / 2, barY = 16;
  ctx.fillStyle = "rgba(255,255,255,0.16)";
  ctx.fillRect(barX, barY, barW, 10);
  ctx.fillStyle = "#f44";
  ctx.fillRect(barX, barY, barW * hpPct, 10);
  ctx.strokeStyle = "#fff";
  ctx.strokeRect(barX, barY, barW, 10);
}

function drawBossDeath() {
  const d = state.bossDeath;
  if (!d) return;

  const t = d.timer;
  const flash = t < 30 ? 1 - t / 30 : 0;
  ctx.save();
  ctx.translate(d.x, d.y);

  if (t < 24) {
    const s = 1.0 + t * 0.04;
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = "#fff";
    ctx.fillRect(-d.w / 2 * s, -d.h / 2 * s, d.w * s, d.h * s);
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "#9ff";
    ctx.fillRect(-d.w / 2 * 1.18, -d.h / 2 * 1.18, d.w * 1.18, d.h * 1.18);
  }

  const bodyAlpha = clamp(1 - t / 120, 0, 1);
  ctx.globalAlpha = bodyAlpha;

  for (const p of d.pieces) {
    ctx.save();
    ctx.translate(p.x - d.x, p.y - d.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }

  ctx.restore();

  if (t < 70 && t % 6 === 0) spawnParticles(d.x + rand(-26, 26), d.y + rand(-16, 16), 10, "#fff", 0.9);
  if (flash > 0) {
    ctx.save();
    ctx.globalAlpha = flash * 0.2;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function drawPowerups() {
  for (const p of state.powerups) {
    const bob = Math.sin(state.frame * 0.12 + p.x * 0.03) * 1.4;
    const spin = state.frame * 0.04;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(spin);

    if (p.type === "spread") ctx.fillStyle = "#4f4";
    else if (p.type === "rapid") ctx.fillStyle = "#ff4";
    else if (p.type === "repair") ctx.fillStyle = "#4af";
    else if (p.type === "wingman") ctx.fillStyle = "#f6f";
    else ctx.fillStyle = "#f6f";

    ctx.beginPath();
    ctx.moveTo(0, -p.size);
    ctx.lineTo(p.size, 0);
    ctx.lineTo(0, p.size);
    ctx.lineTo(-p.size, 0);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.font = "10px Arial";
    ctx.fillText(
      p.type === "spread" ? "S" :
      p.type === "rapid" ? "R" :
      p.type === "repair" ? "+" :
      p.type === "wingman" ? "W" : "2",
      -3,
      4
    );
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.fillStyle = p.color || "#fff";
    ctx.globalAlpha = Math.max(0, p.life / 32);
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawControls() {
  const joyCx = 76, joyCy = H - 76, joyR = 56;
  const actCx = W - 76, actCy = H - 76, actR = 42;

  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.beginPath();
  ctx.arc(joyCx, joyCy, joyR, 0, TAU);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(joyCx, joyCy, joyR, 0, TAU);
  ctx.stroke();

  const knobX = state.joystick.active ? joyCx + state.joystick.ax * joyR * 0.62 : joyCx;
  const knobY = state.joystick.active ? joyCy + state.joystick.ay * joyR * 0.62 : joyCy;
  ctx.fillStyle = "rgba(255,255,255,0.22)";
  ctx.beginPath();
  ctx.arc(knobX, knobY, 18, 0, TAU);
  ctx.fill();

  const wraith = isWraithActive();
  const ready = state.player && state.player.energy >= (wraith ? 18 : 35) && (wraith ? true : state.player.ghostCooldown <= 0);
  const buttonFill = wraith ? (state.playerRealm === 0 ? "rgba(170,220,255,0.26)" : "rgba(210,170,255,0.26)") : (ready ? "rgba(100,255,180,0.22)" : "rgba(255,255,255,0.10)");
  ctx.fillStyle = buttonFill;
  ctx.beginPath();
  ctx.arc(actCx, actCy, actR, 0, TAU);
  ctx.fill();

  ctx.strokeStyle = wraith ? (state.playerRealm === 0 ? "rgba(170,220,255,0.55)" : "rgba(210,170,255,0.55)") : (ready ? "rgba(100,255,180,0.55)" : "rgba(255,255,255,0.28)");
  ctx.beginPath();
  ctx.arc(actCx, actCy, actR, 0, TAU);
  ctx.stroke();

  ctx.fillStyle = "#fff";
  ctx.font = "14px Arial";
  const label = wraith ? "HOP" : "GHOST";
  const tw = ctx.measureText(label).width;
  ctx.fillText(label, actCx - tw / 2, actCy + 5);
}

function drawTopLeftHUD() {
  const p = state.player;
  const offset = bossHudOffset();
  const x = 12;
  const y = 12 + offset;

  const barW = 120;
  const barH = 10;
  const segments = 5;
  const gap = 4;
  const segW = (barW - gap * (segments - 1)) / segments;

  for (let i = 0; i < segments; i++) {
    const sx = x + i * (segW + gap);
    ctx.fillStyle = i < p.hp ? "#d33" : "rgba(110,110,110,0.45)";
    ctx.fillRect(sx, y, segW, barH);
  }

  ctx.strokeStyle = "rgba(255,255,255,0.28)";
  ctx.strokeRect(x - 1, y - 1, barW + 2, barH + 2);

  const energyY = y + 20;
  const actionCost = isWraithActive() ? 18 : 35;
  const enough = p.energy >= actionCost;

  ctx.fillStyle = "rgba(255,255,255,0.16)";
  ctx.fillRect(x, energyY, barW, 8);

  ctx.fillStyle = enough ? "#ff0" : "#f44";
  ctx.fillRect(x, energyY, barW * (p.energy / p.maxEnergy), 8);

  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.strokeRect(x, energyY, barW, 8);

  if (state.devStatsVisible) {
    ctx.fillStyle = "rgba(255,255,255,0.78)";
    ctx.font = "12px Arial";
    const lines = [
      `Phase: ${state.phase}`,
      `Threat: ${state.difficulty.threat.toFixed(2)}`,
      `Pressure: ${Math.round(state.pressure)}`,
      `Heat: ${state.difficulty.heatStreak ? "ON" : "OFF"}`,
      `Drops: ${state.killsSinceLastDrop}`
    ];
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], x, energyY + 16 + i * 14);
    }
  }
}

function drawTopRightHUD() {
  const offset = bossHudOffset();
  ctx.save();
  ctx.textAlign = "right";
  ctx.textBaseline = "top";

  ctx.fillStyle = "#fff";
  ctx.font = "16px Arial";
  ctx.fillText("Score: " + state.score, W - 12, 12 + offset);
  ctx.fillText("High: " + highScore, W - 12, 30 + offset);
  ctx.fillText("Combo x" + state.multiplier, W - 12, 48 + offset);

  ctx.restore();
}

function drawAnnouncements() {
  if (!state.message || state.messageTimer <= 0) return;

  const max = state.messageMax || 1;
  const t = clamp(state.messageTimer / max, 0, 1);
  const alpha = clamp(t < 0.18 ? t / 0.18 : 1, 0, 1);
  const baseY = (state.boss || state.bossDeath) ? 54 : 46;
  const slide = (1 - t) * 10;
  const pad = 14;

  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "18px Arial";

  const textWidth = ctx.measureText(state.message).width;
  const boxW = textWidth + pad * 2;
  const boxH = 28;

  ctx.globalAlpha = alpha;
  ctx.fillStyle = "rgba(0,0,0,0.34)";
  ctx.fillRect(W / 2 - boxW / 2, baseY - boxH / 2 + slide, boxW, boxH);

  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.strokeRect(W / 2 - boxW / 2, baseY - boxH / 2 + slide, boxW, boxH);

  ctx.fillStyle = "#fff";
  ctx.fillText(state.message, W / 2, baseY + slide + 1);
  ctx.restore();
}

function drawHUD() {
  drawTopLeftHUD();
  drawTopRightHUD();
  drawAnnouncements();
}

function drawLowHpWarning() {
  if (!state.player || state.player.hp !== 1) return;
  const pulse = 0.5 + 0.5 * Math.sin(state.frame * 0.08);
  const alpha = 0.04 + pulse * 0.08;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = "rgba(255,70,70,1)";
  ctx.lineWidth = 6;
  ctx.shadowColor = "rgba(255,0,0,0.8)";
  ctx.shadowBlur = 18;
  ctx.strokeRect(4, 4, W - 8, H - 8);
  ctx.restore();
}

function drawDamageFlash() {
  if (state.fx.flash <= 0) return;
  const alpha = (state.fx.flash / 8) * 0.18;
  ctx.save();
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawStartScreen() {
  ctx.save();
  ctx.fillStyle = "#fff";
  ctx.font = "42px Arial";
  const title = "SKY RAID";
  const tw = ctx.measureText(title).width;
  ctx.fillText(title, (W - tw) / 2, H * 0.28);

  ctx.font = "18px Arial";
  const line1 = "Tap / click / press any key to start";
  const w1 = ctx.measureText(line1).width;
  ctx.fillText(line1, (W - w1) / 2, H * 0.40);

  const line2 = "Ghost button or any non-movement key";
  const w2 = ctx.measureText(line2).width;
  ctx.fillText(line2, (W - w2) / 2, H * 0.44);

  const line3 = "High Score: " + highScore;
  const w3 = ctx.measureText(line3).width;
  ctx.fillText(line3, (W - w3) / 2, H * 0.52);
  ctx.restore();
}

function drawGameOverScreen() {
  ctx.save();
  ctx.fillStyle = "#fff";
  ctx.font = "44px Arial";
  const title = "GAME OVER";
  const tw = ctx.measureText(title).width;
  ctx.fillText(title, (W - tw) / 2, H * 0.30);

  ctx.font = "20px Arial";
  const scoreLine = "Score: " + state.score;
  const scoreW = ctx.measureText(scoreLine).width;
  ctx.fillText(scoreLine, (W - scoreW) / 2, H * 0.40);

  const highLine = "High Score: " + highScore;
  const highW = ctx.measureText(highLine).width;
  ctx.fillText(highLine, (W - highW) / 2, H * 0.44);

  if (state.score >= highScore && state.score > 0) {
    const record = "New High Score!";
    const rw = ctx.measureText(record).width;
    ctx.fillText(record, (W - rw) / 2, H * 0.48);
  }

  const line2 = "Tap / click / press any key to restart";
  const w2 = ctx.measureText(line2).width;
  ctx.fillText(line2, (W - w2) / 2, H * 0.58);
  ctx.restore();
}

function draw() {
  const shake = state.fx.shake;
  const sx = shake ? Math.sin(state.frame * 17.13) * shake * 0.6 : 0;
  const sy = shake ? Math.cos(state.frame * 11.7) * shake * 0.6 : 0;

  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();

  if (state.gameState === "playing") {
    drawPowerups();
    drawBullets();
    drawEnemies();
    drawBossDeath();
    drawBoss();
    drawWingmen();
    drawPlayer();
    drawParticles();
    drawControls();
    drawHUD();
  } else if (state.gameState === "start") {
    drawStartScreen();
  } else if (state.gameState === "gameover") {
    drawGameOverScreen();
  }

  ctx.restore();

  if (state.gameState === "playing" || state.gameState === "gameover") {
    drawLowHpWarning();
    drawDamageFlash();
  }
}

function startFromInput() {
  beginGame();
}

function beginGame() {
  setupSession("playing");
  showMessage("PHASE 1", 90);
}

function setupSession(mode = "start") {
  state.player = makePlayer();
  state.bullets = [];
  state.enemyBullets = [];
  state.enemies = [];
  state.powerups = [];
  state.particles = [];
  state.boss = null;
  state.bossDeath = null;
  state.bossRecovery = 0;
  state.wingmen = [];
  state.pendingSpawns = [];
  state.score = 0;
  state.multiplier = 1;
  state.comboKills = 0;
  state.comboPulse = 0;
  state.phase = 1;
  state.frame = 0;
  state.waveTimer = 0;
  state.phaseTimer = 0;
  state.waveIndex = 0;
  state.waveRest = 0;
  state.pressure = 20;
  state.threatScore = 0;
  state.cachedBulletPressure = 0;
  state.cachedBulletBudget = 0;
  state.frameBulletSpent = 0;
  state.message = "";
  state.messageTimer = 0;
  state.messageMax = 0;
  state.messageQueue = [];
  state.fx.shake = 0;
  state.fx.flash = 0;
  state.killsSinceLastDrop = 0;
  state.framesSinceLastDrop = 0;
  state.powerupDropCooldown = 0;
  state.lastBossMode = null;
  state.intensityPhase = "normal";
  state.intensityTimer = 180;
  state.difficulty.threat = 0.75;
  state.difficulty.target = 0.75;
  state.difficulty.grace = 0;
  state.difficulty.ghostGrace = 0;
  state.difficulty.heatStreak = false;
  state.difficulty.lastHitFrame = -999;
  state.difficulty.killStreak = 0;
  state.difficulty.burst = 0;
  state.playerRealm = 0;
  state.devStatsVisible = false;
  state.gameState = mode;
  highScoreDirty = false;

  state.stars = [];
  for (let i = 0; i < 110; i++) {
    state.stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      s: Math.random() * 2 + 0.5,
      spd: Math.random() * 0.9 + 0.3
    });
  }

  refreshMultiplier();
}

function enterGameOver() {
  state.gameState = "gameover";
  if (state.score > highScore) {
    highScore = state.score;
    highScoreDirty = true;
  }
  if (highScoreDirty) saveHighScore();
  state.message = "";
  state.messageTimer = 0;
  state.messageMax = 0;
  state.messageQueue = [];
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  if (!state.player) return;

  state.player.x = clamp(state.player.x, 20, W - 20);
  state.player.y = clamp(state.player.y, H * 0.60, H - 28);

  for (const w of state.wingmen) {
    w.x = clamp(w.x, 20, W - 20);
    w.y = clamp(w.y, H * 0.55, H - 20);
  }
}

canvas.addEventListener("pointerdown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (state.gameState === "playing") {
    if (inDevSkipZone(x, y)) {
      triggerPhaseSkip();
      return;
    }
    if (onDevToggleZone(x, y)) {
      state.devStatsVisible = !state.devStatsVisible;
      return;
    }
  }

  if (state.gameState !== "playing") {
    startFromInput();
    return;
  }

  activePointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);

  if (onActionZone(x, y)) {
    attemptGhost();
    return;
  }

  if (onJoystickZone(x, y)) {
    state.joystick.active = true;
    state.joystick.id = e.pointerId;
    state.joystick.cx = 76;
    state.joystick.cy = H - 76;
    updateJoystickFromPointer(e);
  }
});

canvas.addEventListener("pointermove", (e) => {
  if (state.gameState !== "playing") return;
  if (state.joystick.active && state.joystick.id === e.pointerId) {
    updateJoystickFromPointer(e);
    const mag = Math.hypot(state.joystick.ax, state.joystick.ay);
    if (mag > 1) {
      state.joystick.ax /= mag;
      state.joystick.ay /= mag;
    }
  }
});

function updateJoystickFromPointer(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const dx = x - state.joystick.cx;
  const dy = y - state.joystick.cy;
  const d = Math.hypot(dx, dy);
  const r = state.joystick.radius;
  const s = d > r ? r / d : 1;
  state.joystick.ax = (dx * s) / r;
  state.joystick.ay = (dy * s) / r;
}

function endPointer(e) {
  if (state.joystick.active && state.joystick.id === e.pointerId) {
    state.joystick.active = false;
    state.joystick.id = null;
    state.joystick.ax = 0;
    state.joystick.ay = 0;
  }

  if (activePointerId === e.pointerId) activePointerId = null;
}

canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);

function onActionZone(x, y) {
  const cx = W - 76;
  const cy = H - 76;
  return Math.hypot(x - cx, y - cy) <= 42;
}

function onJoystickZone(x, y) {
  const cx = 76;
  const cy = H - 76;
  return Math.hypot(x - cx, y - cy) <= 62;
}

function isMoveKey(key) {
  return key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight" ||
         key === "w" || key === "a" || key === "s" || key === "d" ||
         key === "W" || key === "A" || key === "S" || key === "D";
}

window.addEventListener("keydown", (e) => {
  const k = e.key;

  if (state.gameState !== "playing") {
    beginGame();
    return;
  }

  if (isMoveKey(k)) {
    e.preventDefault();
    if (k === "ArrowUp" || k === "w" || k === "W") state.keyboard.up = true;
    if (k === "ArrowDown" || k === "s" || k === "S") state.keyboard.down = true;
    if (k === "ArrowLeft" || k === "a" || k === "A") state.keyboard.left = true;
    if (k === "ArrowRight" || k === "d" || k === "D") state.keyboard.right = true;
    return;
  }

  if (!e.repeat && !e.ctrlKey && !e.altKey && !e.metaKey) {
    e.preventDefault();
    attemptGhost();
  }
});

window.addEventListener("keyup", (e) => {
  const k = e.key;
  if (k === "ArrowUp" || k === "w" || k === "W") state.keyboard.up = false;
  if (k === "ArrowDown" || k === "s" || k === "S") state.keyboard.down = false;
  if (k === "ArrowLeft" || k === "a" || k === "A") state.keyboard.left = false;
  if (k === "ArrowRight" || k === "d" || k === "D") state.keyboard.right = false;
});

window.addEventListener("beforeunload", () => {
  if (highScoreDirty) saveHighScore();
});

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener("resize", resize);

loadHighScore();
resize();
setupSession("start");
loop();
</script>
</body>
</html>
